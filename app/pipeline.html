<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline · SourcingNav Talent Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --bg-elev: #111827; --bg-card: #151d2e;
    --border: #1f2a3f; --border-strong: #2d3a54;
    --text: #e8ecf4; --text-dim: #8b9bb3; --text-mute: #5a6c85;
    --accent: #3dd9d6; --accent-deep: #2eb8b5; --blue: #4a9eff;
    --accent-glow: rgba(61, 217, 214, 0.15);
    --gradient: linear-gradient(135deg, #3dd9d6 0%, #4a9eff 100%);
    --danger: #ff6b6b; --warn: #ffb74d; --good: #4ade80;
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; background-image: radial-gradient(ellipse at top right, rgba(61,217,214,0.06) 0%, transparent 50%), radial-gradient(ellipse at bottom left, rgba(74,158,255,0.04) 0%, transparent 50%); background-attachment: fixed; }
</style>
<style>
  .nav { position: sticky; top: 0; z-index: 100; background: rgba(10, 14, 26, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
  .nav-inner { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  .brand { font-family: var(--font-mono); font-weight: 700; font-size: 1rem; letter-spacing: 0.08em; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
  .brand-sub { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-mute); margin-left: 0.75rem; padding-left: 0.75rem; border-left: 1px solid var(--border-strong); }
  .nav-right { display: flex; align-items: center; gap: 1.5rem; font-size: 0.85rem; }
  .nav-link { color: var(--text-dim); text-decoration: none; transition: color 0.15s; }
  .nav-link:hover { color: var(--accent); }
  .nav-link.active { color: var(--text); }
  .page { max-width: 1400px; margin: 0 auto; padding: 3rem 2rem 6rem; }
  .page-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end; gap: 2rem; flex-wrap: wrap; }
  .page-kicker { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .page-title { font-size: 2.25rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.05; }
  .page-title em { font-style: italic; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .page-desc { color: var(--text-dim); font-size: 1rem; max-width: 640px; margin-top: 0.5rem; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; }
  .card-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-mute); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.25rem; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-family: var(--font-body); font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; text-decoration: none; }
  .btn-primary { background: var(--gradient); color: #0a0e1a; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(61, 217, 214, 0.3); }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border-strong); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
</style>
<style>
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .filter-chip { padding: 0.5rem 1rem; background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 999px; color: var(--text-dim); font-size: 0.85rem; cursor: pointer; transition: all 0.15s; font-family: var(--font-body); }
  .filter-chip:hover { color: var(--text); border-color: var(--accent); }
  .filter-chip.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
  .req-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 1.5rem; padding: 1.25rem 1.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 0.75rem; cursor: pointer; transition: all 0.15s; align-items: center; text-decoration: none; color: inherit; }
  .req-row:hover { border-color: var(--accent); transform: translateX(2px); }
  .req-title { font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem; }
  .req-meta { color: var(--text-mute); font-size: 0.8rem; font-family: var(--font-mono); }
  .req-fee { font-family: var(--font-mono); color: var(--accent); font-weight: 600; font-size: 0.95rem; }
  .req-status { font-family: var(--font-mono); font-size: 0.7rem; padding: 0.3rem 0.7rem; border-radius: 999px; letter-spacing: 0.05em; text-transform: uppercase; }
  .req-status.open { background: rgba(74, 222, 128, 0.15); color: var(--good); }
  .req-status.placed { background: rgba(61, 217, 214, 0.15); color: var(--accent); }
  .req-status.closed { background: rgba(139, 155, 179, 0.15); color: var(--text-dim); }
  .req-arrow { color: var(--text-mute); font-size: 1.2rem; }
  .empty-state { padding: 4rem 2rem; text-align: center; background: var(--bg-card); border: 1px dashed var(--border-strong); border-radius: 12px; }
  .empty-state h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
  .empty-state p { color: var(--text-dim); margin-bottom: 1.5rem; }
  .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--text-dim); text-decoration: none; font-size: 0.85rem; margin-bottom: 1rem; transition: color 0.15s; font-family: var(--font-mono); }
  .back-link:hover { color: var(--accent); }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .kpi { padding: 1.25rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; }
  .kpi-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-mute); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .kpi-value { font-family: var(--font-mono); font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .kpi-value.text { font-size: 1rem; color: var(--text); }
</style>
<style>
  .skill-list { list-style: none; }
  .skill-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
  .skill-item:last-child { border-bottom: none; }
  .skill-name { font-weight: 500; }
  .skill-rationale { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.25rem; }
  .severity { font-family: var(--font-mono); font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px; letter-spacing: 0.05em; text-transform: uppercase; flex-shrink: 0; }
  .severity.blocker { background: rgba(255, 107, 107, 0.15); color: var(--danger); }
  .severity.preferred { background: rgba(255, 183, 77, 0.15); color: var(--warn); }
  .bool-section { margin-bottom: 2rem; }
  .bool-section-title { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .bool-string { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
  .bool-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-mute); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
  .bool-copy { background: transparent; border: 1px solid var(--border-strong); color: var(--text-dim); padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.7rem; cursor: pointer; font-family: var(--font-mono); }
  .bool-copy:hover { color: var(--accent); border-color: var(--accent); }
  .bool-copy.copied { color: var(--good); border-color: var(--good); }
  .bool-text { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text); word-break: break-all; line-height: 1.5; }
  .loading { padding: 4rem 2rem; text-align: center; color: var(--text-dim); font-family: var(--font-mono); }
  .err-box { background: rgba(255, 107, 107, 0.08); border: 1px solid var(--danger); border-radius: 8px; padding: 1rem; color: var(--danger); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 1.5rem; color: var(--text-dim); font-family: var(--font-mono); font-size: 0.85rem; margin-bottom: 1rem; }
  .note-block { padding: 1rem; background: var(--bg-elev); border-left: 3px solid var(--accent); border-radius: 4px; margin-bottom: 0.75rem; }
  .note-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.4rem; }
  .note-text { font-size: 0.9rem; color: var(--text); }
  /* Candidate evaluation */
  .eval-textarea { width: 100%; min-height: 200px; padding: 1rem; background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 8px; color: var(--text); font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.5; resize: vertical; }
  .eval-textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .eval-input-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; margin-top: 1rem; }
  .eval-input { padding: 0.7rem 0.9rem; background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: 0.88rem; }
  .eval-input:focus { outline: none; border-color: var(--accent); }
  .sub-row { padding: 1.25rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.75rem; cursor: pointer; transition: all 0.15s; }
  .sub-row:hover { border-color: var(--accent); }
  .sub-row.expanded { border-color: var(--accent); }
  .sub-header { display: grid; grid-template-columns: auto 1fr auto auto; gap: 1rem; align-items: center; }
  .sub-score { font-family: var(--font-mono); font-weight: 700; font-size: 1.5rem; min-width: 60px; }
  .sub-score.high { color: var(--good); }
  .sub-score.mid { color: var(--warn); }
  .sub-score.low { color: var(--danger); }
  .sub-name { font-weight: 600; }
  .sub-meta { color: var(--text-mute); font-size: 0.8rem; font-family: var(--font-mono); margin-top: 0.25rem; }
  .sub-rec { font-family: var(--font-mono); font-size: 0.7rem; padding: 0.3rem 0.7rem; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em; }
  .sub-rec.SUBMIT { background: rgba(74, 222, 128, 0.15); color: var(--good); }
  .sub-rec.INTERVIEW { background: rgba(255, 183, 77, 0.15); color: var(--warn); }
  .sub-rec.PASS { background: rgba(139, 155, 179, 0.15); color: var(--text-dim); }
  .sub-detail { display: none; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  .sub-row.expanded .sub-detail { display: block; }
  .sub-section { margin-bottom: 1.25rem; }
  .sub-section-title { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.6rem; }
  .assess-list { list-style: none; }
  .assess-item { display: flex; gap: 0.75rem; padding: 0.5rem 0; align-items: flex-start; }
  .assess-status { font-family: var(--font-mono); font-size: 0.65rem; padding: 0.15rem 0.45rem; border-radius: 4px; flex-shrink: 0; text-transform: uppercase; }
  .assess-status.met { background: rgba(74,222,128,0.15); color: var(--good); }
  .assess-status.partial { background: rgba(255,183,77,0.15); color: var(--warn); }
  .assess-status.missing, .assess-status.unclear { background: rgba(255,107,107,0.15); color: var(--danger); }
  .assess-text { font-size: 0.88rem; }
  .assess-evidence { color: var(--text-dim); font-size: 0.8rem; margin-top: 0.2rem; }

  /* Engine Scorecard (Phase A finishing - 2026-05-11) */
  .engine-scorecard {
    background: linear-gradient(180deg, rgba(61,217,214,0.04) 0%, transparent 100%);
    border: 1px solid rgba(61,217,214,0.2);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    margin-bottom: 1.2rem;
  }
  .engine-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 1rem; margin-bottom: 0.85rem;
  }
  .engine-title { display: flex; flex-direction: column; gap: 0.2rem; }
  .engine-badge {
    font-family: var(--font-mono); font-size: 0.7rem;
    color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase;
    padding: 0.2rem 0.5rem; background: rgba(61,217,214,0.1);
    border: 1px solid rgba(61,217,214,0.25);
    border-radius: 4px; display: inline-block; width: fit-content;
  }
  .engine-sub { font-size: 0.78rem; color: var(--text-dim); margin-top: 0.2rem; }
  .engine-composite { text-align: right; }
  .composite-score {
    font-family: var(--font-mono); font-size: 2rem; font-weight: 600;
    line-height: 1; letter-spacing: -0.02em;
  }
  .composite-rec {
    font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em;
    text-transform: uppercase; margin-top: 0.35rem; padding: 0.2rem 0.45rem;
    border-radius: 4px; display: inline-block;
  }
  .composite-rec.Strong-Submit { background: rgba(74,222,128,0.18); color: var(--good); }
  .composite-rec.Submit { background: rgba(74,222,128,0.12); color: var(--good); }
  .composite-rec.Maybe { background: rgba(255,183,77,0.12); color: var(--warn); }
  .composite-rec.Pass { background: rgba(255,107,107,0.1); color: var(--danger); }
  .composite-rec.Hard-Pass { background: rgba(255,107,107,0.2); color: var(--danger); }
  .engine-blocker-banner {
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.25);
    color: var(--danger);
    padding: 0.55rem 0.8rem;
    border-radius: 6px;
    font-size: 0.85rem;
    margin-bottom: 0.85rem;
  }
  .dim-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.45rem;
  }
  .dim-row {
    display: grid;
    grid-template-columns: minmax(120px, 1.4fr) 50px minmax(0, 3fr);
    gap: 0.85rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    align-items: center;
  }
  .dim-row:last-child { border-bottom: none; }
  .dim-label { display: flex; flex-direction: column; gap: 0.15rem; }
  .dim-name { font-size: 0.88rem; font-weight: 500; }
  .dim-meta { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-mute); }
  .dim-score {
    font-family: var(--font-mono); font-size: 1.1rem; font-weight: 600;
    text-align: right; letter-spacing: -0.02em;
  }
  .dim-max { font-size: 0.65rem; color: var(--text-mute); font-weight: 400; margin-left: 0.1rem; }
  .dim-rationale {
    font-size: 0.78rem; color: var(--text-dim); line-height: 1.4;
    overflow-wrap: anywhere;
  }
  .engine-blockers { margin-top: 0.65rem; }
  .engine-composite-note {
    margin-top: 0.85rem;
    padding-top: 0.75rem;
    border-top: 1px solid rgba(255,255,255,0.05);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-mute);
    line-height: 1.5;
  }

  /* Stage transition controls (Phase B1 calibration UI) */
  .stage-bar {
    display: flex; gap: 0.4rem; flex-wrap: wrap;
    padding: 0.75rem; background: rgba(61, 217, 214, 0.05);
    border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 1rem;
  }
  .stage-bar-label {
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-mute); font-weight: 600; align-self: center;
    margin-right: 0.4rem;
  }
  .stage-btn {
    padding: 0.35rem 0.7rem; font-size: 0.82rem; font-weight: 500;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); border-radius: 6px; cursor: pointer;
    transition: all 0.15s;
  }
  .stage-btn:hover:not(:disabled) {
    border-color: var(--accent); color: var(--text);
  }
  .stage-btn.active {
    background: var(--accent); color: #0b1220;
    border-color: var(--accent); font-weight: 600;
  }
  .stage-btn.placed { background: rgba(74,222,128,0.15); color: var(--good); border-color: var(--good); }
  .stage-btn.placed.active { background: var(--good); color: #0b1220; }
  .stage-btn.rejected { background: rgba(255,107,107,0.08); color: var(--danger); border-color: var(--danger); }
  .stage-btn.rejected.active { background: var(--danger); color: white; }
  .stage-btn:disabled { opacity: 0.5; cursor: wait; }
  .stage-feedback {
    padding: 0.6rem 0.75rem; margin-top: 0.5rem; border-radius: 6px;
    font-size: 0.85rem; background: rgba(61, 217, 214, 0.08);
    border: 1px solid var(--border);
  }
  .stage-feedback.err { background: rgba(255,107,107,0.08); color: var(--danger); }
  /* Schedule modal (Phase E.3) */
  .sched-trigger { margin-left: 0.6rem; padding: 0.35rem 0.85rem; font-size: 0.78rem;
    background: rgba(74, 158, 255, 0.12); color: #4a9eff;
    border: 1px solid rgba(74, 158, 255, 0.3); border-radius: 6px; cursor: pointer;
    font-family: var(--font-mono); transition: all 0.15s; }
  .sched-trigger:hover { background: rgba(74, 158, 255, 0.2); }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
    display: none; align-items: center; justify-content: center; padding: 2rem; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.5rem; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal h3 { margin: 0 0 0.5rem; font-size: 1.15rem; }
  .modal-sub { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 1.25rem; }
  .modal label { display: block; font-size: 0.78rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; margin-top: 0.85rem; }
  .modal input, .modal select, .modal textarea { width: 100%; padding: 0.6rem 0.75rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: inherit; font-size: 0.9rem; box-sizing: border-box; }
  .modal textarea { min-height: 60px; resize: vertical; font-family: inherit; }
  .modal-actions { margin-top: 1.5rem; display: flex; gap: 0.6rem; justify-content: flex-end; }
  .modal-btn { padding: 0.6rem 1.1rem; border-radius: 6px; cursor: pointer;
    font-size: 0.88rem; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
  .modal-btn.primary { background: var(--accent); color: #0b1220; border-color: var(--accent);
    font-weight: 600; }
  .modal-btn:disabled { opacity: 0.5; cursor: wait; }
  .modal-err { background: rgba(255,107,107,0.1); color: var(--danger);
    padding: 0.6rem 0.85rem; border-radius: 6px; font-size: 0.85rem; margin-top: 0.85rem; display: none; }
  .modal-err.show { display: block; }

</style>
</head>

<script>
// Global error handler — shows ANY uncaught error on screen instead of leaving
// a blank page. Catches both synchronous errors and unhandled promise rejections.
// Without this, a JS error during render can produce a page with no content
// and no feedback, making the user think the site is broken.
(function installGlobalErrorHandler() {
  function showError(msg, src) {
    const container = document.getElementById('detailView') || document.getElementById('listView') || document.body;
    if (!container) return;
    if (container.style) container.style.display = 'block';
    container.innerHTML = `
      <div style="max-width: 800px; margin: 2rem auto; padding: 1.5rem; background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.4); border-radius: 8px; color: #ffebee; font-family: system-ui, sans-serif;">
        <div style="font-weight: 700; font-size: 1rem; margin-bottom: 0.6rem; color: #ff6b6b;">Page error</div>
        <div style="font-size: 0.9rem; margin-bottom: 0.4rem;">${String(msg).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}</div>
        <div style="font-size: 0.8rem; opacity: 0.7;">Source: ${String(src || 'unknown').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}</div>
        <div style="margin-top: 0.8rem;"><a href="/app/pipeline.html" style="color: #3dd9d6;">Back to pipeline list</a></div>
      </div>
    `;
  }
  window.addEventListener('error', (e) => showError(e.message, e.filename + ':' + e.lineno));
  window.addEventListener('unhandledrejection', (e) => showError(e.reason?.message || e.reason || 'Promise rejected', 'async'));
})();

const API = '/api';
const token = localStorage.getItem('sn_token');
if (!token) {
  // Was: silent redirect that looked like a blank page when localStorage
  // was clear in a new tab. Now shows a visible message for 1 second,
  // then redirects. Never blank.
  document.addEventListener('DOMContentLoaded', () => {
    const c = document.getElementById('listView') || document.body;
    c.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-dim);">Signing you back in...</div>';
  });
  setTimeout(() => { location.href = '/app/'; }, 800);
}

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) };
  const res = await fetch(`${API}${path}`, { ...opts, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `Request failed (${res.status})`);
  }
  return res.json();
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function timeAgo(iso) {
  if (!iso) return 'unknown';
  const then = new Date(iso.includes('T') ? iso : iso.replace(' ', 'T') + 'Z');
  const diff = Math.floor((Date.now() - then.getTime()) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

function fmtFee(n) {
  if (n === null || n === undefined) return 'TBD';
  if (typeof n !== 'number') return escapeHtml(String(n));
  return '$' + Math.round(n).toLocaleString();
}

let allReqs = [];
let currentFilter = 'all';
async function loadList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('listView').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-kicker">Pipeline</div>
        <h1 class="page-title">Your <em>requisitions</em></h1>
        <p class="page-desc">Every JD you've intaked, ready to source against.</p>
      </div>
      <a href="/app/" class="btn btn-primary">+ New Intake</a>
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div id="reqsList" class="loading">Loading your pipeline...</div>
  `;
  try {
    const data = await api('/reqs');
    allReqs = data.reqs || [];
    renderFilters();
    renderList();
  } catch (e) {
    document.getElementById('reqsList').innerHTML = `<div class="err-box">Could not load pipeline: ${escapeHtml(e.message)}</div>`;
  }
}

function renderFilters() {
  const counts = { all: allReqs.length };
  for (const r of allReqs) counts[r.status] = (counts[r.status] || 0) + 1;
  const statuses = ['all', 'open', 'placed', 'closed'];
  document.getElementById('filterBar').innerHTML = statuses
    .filter(s => s === 'all' || counts[s])
    .map(s => `<button class="filter-chip ${s === currentFilter ? 'active' : ''}" data-filter="${s}">${s.charAt(0).toUpperCase() + s.slice(1)} (${counts[s] || 0})</button>`)
    .join('');
  document.querySelectorAll('.filter-chip').forEach(b => {
    b.addEventListener('click', () => {
      currentFilter = b.dataset.filter;
      renderFilters();
      renderList();
    });
  });
}
function renderList() {
  const list = document.getElementById('reqsList');
  list.classList.remove('loading');
  const filtered = currentFilter === 'all' ? allReqs : allReqs.filter(r => r.status === currentFilter);
  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <h3>${allReqs.length === 0 ? 'No requisitions yet' : `No ${currentFilter} requisitions`}</h3>
        <p>${allReqs.length === 0 ? 'Run your first JD intake to get started.' : 'Switch filters or run a new intake.'}</p>
        <a href="/app/" class="btn btn-primary">+ Run Intake</a>
      </div>
    `;
    return;
  }
  list.innerHTML = filtered.map(r => `
    <a class="req-row" href="/app/pipeline.html?req=${encodeURIComponent(r.id)}">
      <div>
        <div class="req-title">${escapeHtml(r.title)}</div>
        <div class="req-meta">${escapeHtml(r.org_name || 'Unknown org')} · Opened ${timeAgo(r.opened_at)}</div>
      </div>
      <div class="req-fee">${fmtFee(r.fee_estimate)}</div>
      <div class="req-status ${escapeHtml(r.status || 'open')}">${escapeHtml(r.status || 'open')}</div>
      <div class="req-arrow">→</div>
    </a>
  `).join('');
}

}
function renderDetail(d) {
  const p = d.parsed || {};
  const b = d.boolean_strings || {};
  const comp = p.comp_snapshot || {};
  const mustHaves = (p.must_have_skills || []).slice().sort((a, b) => {
    const order = { blocker: 0, preferred: 1 };
    return (order[a.severity] ?? 2) - (order[b.severity] ?? 2);
  });
  const niceToHaves = p.nice_to_have_skills || [];
  document.getElementById('detailView').innerHTML = `
    <a href="/app/pipeline.html" class="back-link">← Back to pipeline</a>
    <div class="page-header">
      <div style="flex: 1;">
        <div class="page-kicker">${escapeHtml(d.org_name || 'Requisition')}</div>
        <h1 class="page-title">${escapeHtml(d.title)}</h1>
        <div class="meta-row" style="margin-top: 1rem;">
          <span>Status: ${escapeHtml(d.status || 'open')}</span>
          <span>Opened ${timeAgo(d.opened_at)}</span>
        </div>
      </div>
      ${d.status === 'open' ? `
        <div style="display: flex; gap: 0.6rem; flex-wrap: wrap;">
          <a href="/app/match.html?req=${escapeHtml(d.id)}" class="btn btn-ghost" style="white-space: nowrap;" title="Score every candidate in your pool against this req">Match candidates</a>

      ` : ''}
    </div>
    ${renderCloseOutForm(d)}
    ${renderClientInfoCard(d.id)}
    ${renderCompCard(comp, p)}
    ${renderSkillsCard(mustHaves, niceToHaves)}
    ${renderAltTitlesCard(p.alt_titles)}
    ${renderSkillAlternativesCard(p.skill_alternatives)}
    ${renderBooleanCard(b)}
    ${renderWateringHolesCard(p.watering_holes)}
    ${renderSubmissionsCard(d.id)}
    ${renderEvaluateCard(d.id)}
    ${renderObjectionPlaybookCard(p.objection_playbook)}
    ${renderSequencedPlayCard(p.sequenced_play)}
    ${renderNotesCard(b.mentor_notes)}
    ${renderRawJDCard(d.jd_raw)}
  `;
  document.querySelectorAll('.bool-copy').forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.dataset.copy;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);

  });
  wireEvalForm();
  wireCloseOutForm(d);
  loadSubmissions(d.id);
  ciLoad();
}

// Close Out feature (2026-05-11): allows closing out an open req from the

// Stage 2 outcome endpoint AND updates the req's status. The req then

  return `
    <section id="closeOutCard" class="card" style="display: none; border-color: var(--accent);">

      <div style="display: grid; gap: 0.85rem;">
        <div>
          <label style="display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.35rem;">Outcome</label>
          <select id="coOutcome" style="width: 100%; padding: 0.6rem; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px;">
            <option value="">-- select --</option>
            <option value="filled">Filled / Hired</option>
            <option value="lost">Lost (req went to another agency or internal)</option>
            <option value="cancelled">Cancelled / Closed without hire</option>

          </select>
        </div>
        <div>
          <label style="display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.35rem;">Time to close (days, optional)</label>
          <input type="number" id="coDays" min="0" placeholder="e.g. 42" style="width: 100%; padding: 0.6rem; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px;">
        </div>
        <div id="coFilledFields" style="display: none; padding: 0.75rem; background: rgba(74,222,128,0.05); border-radius: 6px; display: grid; gap: 0.6rem;">
          <div>
            <label style="display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.35rem;">Placed candidate's previous company (optional, feeds poach intelligence)</label>
            <input type="text" id="coPrevCompany" placeholder="e.g. NVIDIA" style="width: 100%; padding: 0.6rem; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px;">
          </div>
          <div>
            <label style="display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.35rem;">Placed candidate's top skills (comma-separated, optional)</label>
            <input type="text" id="coSkills" placeholder="e.g. python, embedded linux, arm" style="width: 100%; padding: 0.6rem; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px;">
          </div>
        </div>
        <div id="coLostFields" style="display: none;">
          <label style="display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.35rem;">Lost to which company (optional)</label>
          <input type="text" id="coLostTo" placeholder="e.g. Skydio in-house" style="width: 100%; padding: 0.6rem; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px;">
        </div>
        <div>
          <label style="display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.35rem;">Notes (optional)</label>
          <textarea id="coNotes" rows="2" placeholder="What did you learn from this search?" style="width: 100%; padding: 0.6rem; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; resize: vertical;"></textarea>
        </div>
        <div class="btn-row" style="margin-top: 0.5rem;">
          <button id="coSubmit" class="btn btn-primary">Submit Outcome</button>
          <button id="coCancel" class="btn btn-ghost">Cancel</button>

        </div>
      </div>
    </section>
  `;
}

function wireCloseOutForm(d) {
  if (d.status !== 'open') return;
  const btn = document.getElementById('closeOutBtn');
  const card = document.getElementById('closeOutCard');
  const outcomeSel = document.getElementById('coOutcome');
  const filledFields = document.getElementById('coFilledFields');
  const lostFields = document.getElementById('coLostFields');
  const cancelBtn = document.getElementById('coCancel');
  const submitBtn = document.getElementById('coSubmit');
  const statusEl = document.getElementById('coStatus');
  if (!btn || !card) return;
  btn.addEventListener('click', () => {
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  cancelBtn.addEventListener('click', () => { card.style.display = 'none'; });
  outcomeSel.addEventListener('change', () => {
    const v = outcomeSel.value;
    filledFields.style.display = v === 'filled' ? 'grid' : 'none';
    lostFields.style.display = v === 'lost' ? 'block' : 'none';
  });
  submitBtn.addEventListener('click', async () => {
    const outcome = outcomeSel.value;
    if (!outcome) {
      statusEl.style.color = 'var(--danger)';
      statusEl.textContent = 'Pick an outcome first.';
      return;
    }
    statusEl.style.color = 'var(--text-dim)';
    statusEl.textContent = 'Submitting...';
    submitBtn.disabled = true;
    try {
      const daysVal = document.getElementById('coDays').value;
      const skillsVal = document.getElementById('coSkills').value;
      const body = {
        outcome,
        time_to_close_days: daysVal ? parseInt(daysVal, 10) : null,
        placed_candidate_company_prev: document.getElementById('coPrevCompany').value || null,
        placed_candidate_skills: skillsVal ? skillsVal.split(',').map(s => s.trim()).filter(Boolean) : null,
        lost_to_company: document.getElementById('coLostTo').value || null,
        notes: document.getElementById('coNotes').value || null,
      };
      await api(`/req/${encodeURIComponent(d.id)}/outcome`, { method: 'POST', body: JSON.stringify(body) });
      statusEl.style.color = 'var(--good)';
      statusEl.textContent = '✓ Outcome logged. Refreshing...';
      setTimeout(() => { window.location.href = '/app/pipeline.html'; }, 900);
    } catch (e) {
      statusEl.style.color = 'var(--danger)';
      statusEl.textContent = 'Failed: ' + e.message;
      submitBtn.disabled = false;
    }
  });
}
// Client info panel (Phase E.3.1) - free-form company/contact/prep info per req.
// Renders a collapsed card with a placeholder until populated, plus an inline
// editor that saves the whole blob via PUT /api/reqs/{id}/client-info.
function renderClientInfoCard(reqId) {
  return `
    <section class="card" id="clientInfoCard" data-req-id="${escapeHtml(reqId)}">
      <div class="card-label">Client Info</div>
      <h2 class="card-title">Company, contacts, and prep</h2>
      <div id="clientInfoView">
        <div class="loading" style="padding: 1rem 0;">Loading...</div>
      </div>
    </section>
  `;
}

function ciEscape(s) { return escapeHtml(s == null ? '' : String(s)); }

function ciRenderView(info) {
  const i = info || {};
  const hasAny = i.company_name || i.website || (i.contacts && i.contacts.length)
    || i.prep_notes || (i.interview_process && i.interview_process.length)
    || i.perks_talking_points;
  if (!hasAny) {
    return `
      <p style="color: var(--text-dim); margin: 0 0 1rem 0;">
        No client info captured yet. Add the company, contacts, prep notes,
        interview process, and perks talking points here so every screen has it.
      </p>
      <button class="btn btn-primary" onclick="ciStartEdit()">Add client info</button>
    `;
  }
  const contactsHtml = (i.contacts || []).map(c => {
    const lines = [];
    if (c.name) lines.push(`<strong>${ciEscape(c.name)}</strong>`);
    if (c.role) lines.push(`<span style="color: var(--text-dim);">${ciEscape(c.role)}</span>`);
    if (c.email) lines.push(`<a href="mailto:${ciEscape(c.email)}">${ciEscape(c.email)}</a>`);
    if (c.phone) lines.push(ciEscape(c.phone));
    if (c.linkedin) lines.push(`<a href="${ciEscape(c.linkedin)}" target="_blank" rel="noopener">LinkedIn</a>`);
    return `<li style="margin-bottom: 0.5rem;">${lines.join(' &middot; ')}</li>`;
  }).join('');
  const processHtml = (i.interview_process || []).map((stage, idx) => {
    const parts = [];
    if (stage.stage) parts.push(`<strong>${idx + 1}. ${ciEscape(stage.stage)}</strong>`);
    if (stage.who) parts.push(`<span style="color: var(--text-dim);">${ciEscape(stage.who)}</span>`);
    if (stage.duration) parts.push(ciEscape(stage.duration));
    const focus = stage.focus ? `<div style="color: var(--text-dim); font-size: 0.85rem; margin-top: 0.25rem;">${ciEscape(stage.focus)}</div>` : '';
    return `<li style="margin-bottom: 0.5rem;">${parts.join(' &middot; ')}${focus}</li>`;
  }).join('');
  return `
    <div class="kpi-row">
      ${i.company_name ? `<div class="kpi"><div class="kpi-label">Company</div><div class="kpi-value text">${ciEscape(i.company_name)}</div></div>` : ''}
      ${i.website ? `<div class="kpi"><div class="kpi-label">Website</div><div class="kpi-value text"><a href="${ciEscape(i.website)}" target="_blank" rel="noopener">${ciEscape(i.website)}</a></div></div>` : ''}
    </div>
    ${contactsHtml ? `
      <div class="note-block">
        <div class="note-label">Contacts</div>
        <ul style="margin: 0.5rem 0 0 1.2rem; padding: 0;">${contactsHtml}</ul>
      </div>
    ` : ''}
    ${i.prep_notes ? `
      <div class="note-block">
        <div class="note-label">Client prep notes</div>
        <div class="note-text" style="white-space: pre-wrap;">${ciEscape(i.prep_notes)}</div>
      </div>
    ` : ''}
    ${processHtml ? `
      <div class="note-block">
        <div class="note-label">Interview process</div>
        <ol style="margin: 0.5rem 0 0 1.2rem; padding: 0;">${processHtml}</ol>
      </div>
    ` : ''}
    ${i.perks_talking_points ? `
      <div class="note-block">
        <div class="note-label">Perks &amp; pay talking points</div>
        <div class="note-text" style="white-space: pre-wrap;">${ciEscape(i.perks_talking_points)}</div>
      </div>
    ` : ''}
    <div style="margin-top: 1rem;">
      <button class="btn btn-ghost" onclick="ciStartEdit()">Edit client info</button>
    </div>
  `;
}

let _ciCurrent = {};

async function ciLoad() {
  const card = document.getElementById('clientInfoCard');
  if (!card) return;
  const reqId = card.getAttribute('data-req-id');
  const view = document.getElementById('clientInfoView');
  try {
    const data = await api(`/reqs/${encodeURIComponent(reqId)}/client-info`);
    _ciCurrent = data.client_info || {};
    view.innerHTML = ciRenderView(_ciCurrent);
  } catch (e) {
    view.innerHTML = `<div class="err-box">Could not load client info: ${escapeHtml(e.message)}</div>`;
  }
}

function ciStartEdit() {
  const view = document.getElementById('clientInfoView');
  if (!view) return;
  const i = _ciCurrent || {};
  const contactRows = (i.contacts && i.contacts.length ? i.contacts : [{}]).map((c, idx) => ciContactRow(c, idx)).join('');

    <label style="display: block; margin-top: 0.75rem; font-weight: 600;">Website</label>
    <input id="ci_website" class="input-field" value="${ciEscape(i.website || '')}" placeholder="https://example.com" />

    <label style="display: block; margin-top: 1rem; font-weight: 600;">Contacts</label>
    <div id="ci_contacts">${contactRows}</div>

    <label style="display: block; margin-top: 1rem; font-weight: 600;">Client prep notes</label>
    <textarea id="ci_prep_notes" class="input-field" rows="4" placeholder="Culture, gotchas, must-asks, anything to remember when talking to this client">${ciEscape(i.prep_notes || '')}</textarea>

    <label style="display: block; margin-top: 1rem; font-weight: 600;">Interview process</label>
    <div id="ci_process">${processRows}</div>
    <button class="btn btn-ghost" type="button" onclick="ciAddProcess()" style="margin-top: 0.5rem;">+ Add stage</button>

    <label style="display: block; margin-top: 1rem; font-weight: 600;">Perks &amp; pay talking points</label>
    <textarea id="ci_perks" class="input-field" rows="3" placeholder="Comp, equity, remote policy, benefits, why this role is worth the move">${ciEscape(i.perks_talking_points || '')}</textarea>

    <div id="ciErr" class="err-box" style="display: none; margin-top: 1rem;"></div>

    <div style="margin-top: 1.25rem; display: flex; gap: 0.6rem;">
      <button class="btn btn-primary" onclick="ciSave()">Save</button>
      <button class="btn btn-ghost" onclick="ciCancelEdit()">Cancel</button>
    </div>
  `;
}

function ciContactRow(c, idx) {
  c = c || {};
  return `
    <div class="ci-contact-row" data-idx="${idx}" style="border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem; margin-top: 0.5rem;">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
        <input class="input-field ci-c-name" value="${ciEscape(c.name || '')}" placeholder="Name" />
        <input class="input-field ci-c-role" value="${ciEscape(c.role || '')}" placeholder="Role (hiring_manager, recruiter, etc.)" />
        <input class="input-field ci-c-email" value="${ciEscape(c.email || '')}" placeholder="Email" />
        <input class="input-field ci-c-phone" value="${ciEscape(c.phone || '')}" placeholder="Phone" />
        <input class="input-field ci-c-linkedin" value="${ciEscape(c.linkedin || '')}" placeholder="LinkedIn URL" style="grid-column: 1 / -1;" />
      </div>
      <button class="btn btn-ghost" type="button" onclick="ciRemoveContact(${idx})" style="margin-top: 0.4rem; font-size: 0.8rem;">Remove</button>
    </div>
  `;
}

function ciProcessRow(s, idx) {
  s = s || {};
  return `
    <div class="ci-process-row" data-idx="${idx}" style="border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem; margin-top: 0.5rem;">
      <div style="display: grid; grid-template-columns: 2fr 2fr 1fr; gap: 0.5rem;">
        <input class="input-field ci-p-stage" value="${ciEscape(s.stage || '')}" placeholder="Stage (e.g. Phone screen)" />
        <input class="input-field ci-p-who" value="${ciEscape(s.who || '')}" placeholder="Who (Recruiter, Hiring Manager, etc.)" />
        <input class="input-field ci-p-duration" value="${ciEscape(s.duration || '')}" placeholder="Duration" />
      </div>
      <input class="input-field ci-p-focus" value="${ciEscape(s.focus || '')}" placeholder="Focus / what they're looking for" style="margin-top: 0.4rem;" />
      <button class="btn btn-ghost" type="button" onclick="ciRemoveProcess(${idx})" style="margin-top: 0.4rem; font-size: 0.8rem;">Remove</button>
    </div>
  `;
}

function ciCollectFromForm() {
  const contacts = [];
  document.querySelectorAll('#ci_contacts .ci-contact-row').forEach(row => {
    const c = {
      name: row.querySelector('.ci-c-name').value.trim(),
      role: row.querySelector('.ci-c-role').value.trim(),
      email: row.querySelector('.ci-c-email').value.trim(),
      phone: row.querySelector('.ci-c-phone').value.trim(),
      linkedin: row.querySelector('.ci-c-linkedin').value.trim(),
    };
    // Only include non-empty contacts
    if (c.name || c.email || c.phone || c.linkedin) contacts.push(c);
  });
  const process = [];
  document.querySelectorAll('#ci_process .ci-process-row').forEach(row => {
    const s = {
      stage: row.querySelector('.ci-p-stage').value.trim(),
      who: row.querySelector('.ci-p-who').value.trim(),
      duration: row.querySelector('.ci-p-duration').value.trim(),
      focus: row.querySelector('.ci-p-focus').value.trim(),
    };
    if (s.stage || s.who || s.duration || s.focus) process.push(s);
  });
  const info = {};
  const co = document.getElementById('ci_company_name').value.trim();
  if (co) info.company_name = co;
  const ws = document.getElementById('ci_website').value.trim();
  if (ws) info.website = ws;
  if (contacts.length) info.contacts = contacts;
  const pn = document.getElementById('ci_prep_notes').value.trim();
  if (pn) info.prep_notes = pn;
  if (process.length) info.interview_process = process;
  const pk = document.getElementById('ci_perks').value.trim();
  if (pk) info.perks_talking_points = pk;
  return info;
}

function ciAddContact() {
  const wrap = document.getElementById('ci_contacts');
  const idx = wrap.children.length;
  wrap.insertAdjacentHTML('beforeend', ciContactRow({}, idx));
}

function ciAddProcess() {
  const wrap = document.getElementById('ci_process');
  const idx = wrap.children.length;
  wrap.insertAdjacentHTML('beforeend', ciProcessRow({}, idx));
}

function ciRemoveContact(idx) {
  const row = document.querySelector(`#ci_contacts .ci-contact-row[data-idx="${idx}"]`);
  if (row) row.remove();
}

function ciRemoveProcess(idx) {
  const row = document.querySelector(`#ci_process .ci-process-row[data-idx="${idx}"]`);
  if (row) row.remove();
}

async function ciSave() {
  const card = document.getElementById('clientInfoCard');
  if (!card) return;
  const reqId = card.getAttribute('data-req-id');
  const info = ciCollectFromForm();
  const errEl = document.getElementById('ciErr');
  errEl.style.display = 'none';
  try {
    const result = await api(`/reqs/${encodeURIComponent(reqId)}/client-info`, {
      method: 'PUT',
      body: JSON.stringify({ client_info: info }),
    });
    _ciCurrent = result.client_info || info;
    document.getElementById('clientInfoView').innerHTML = ciRenderView(_ciCurrent);
  } catch (e) {
    errEl.textContent = 'Could not save: ' + (e.message || 'unknown error');
    errEl.style.display = 'block';
  }
}

function ciCancelEdit() {
  document.getElementById('clientInfoView').innerHTML = ciRenderView(_ciCurrent);
}

function renderAltTitlesCard(alt) {
  // Backwards-compatible: old reqs may have flat ic_junior/ic_mid/etc structure;
  // new reqs have nested level_progression + functional_aliases + adjacent_crossover.
  if (!alt) return '';
  const levels = alt.level_progression || (alt.ic_junior !== undefined ? alt : null);
  const functional = alt.functional_aliases || [];
  const adjacent = alt.adjacent_crossover || [];

  // If literally nothing, render nothing
  const hasAnything = (levels && (
    (levels.ic_junior || []).length || (levels.ic_mid || []).length ||
    (levels.ic_senior || []).length || (levels.ic_staff_plus || []).length
  )) || functional.length || adjacent.length;
  if (!hasAnything) return '';

  const renderTitleChips = (arr) => (arr || []).map(t =>
    `<span style="display: inline-block; padding: 0.3rem 0.7rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; margin: 0.2rem;">${escapeHtml(t)}</span>`
  ).join('');

  let body = '';

  // Level progression — same role at different levels
  if (levels) {
    const rows = [
      ['Junior',     levels.ic_junior],
      ['Mid',        levels.ic_mid],
      ['Senior',     levels.ic_senior],
      ['Staff+',     levels.ic_staff_plus],
    ].filter(([_, arr]) => (arr || []).length);
    if (rows.length) {
      body += `
        <div class="sub-section">
          <div class="sub-section-title">Same role at different levels</div>
          <div style="font-size: 0.83rem; color: var(--text-mute); margin-bottom: 0.6rem;">
            What peer companies call this role at junior through staff+ levels.
            Useful when you're flexible on seniority.
          </div>
          <div style="display: grid; grid-template-columns: 80px 1fr; gap: 0.5rem 1rem; align-items: start;">
            ${rows.map(([label, arr]) => `
              <div style="font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-mute); padding-top: 0.5rem;">${label}</div>
              <div>${renderTitleChips(arr)}</div>
            `).join('')}
          </div>
        </div>
      `;
    }
  }

  // Functional aliases — same person, different naming convention
  if (functional.length) {
    body += `
      <div class="sub-section">
        <div class="sub-section-title">Same person, different name</div>
        <div style="font-size: 0.83rem; color: var(--text-mute); margin-bottom: 0.6rem;">
          What peer companies call the SAME person under different naming conventions.
          Add these to your search to broaden the candidate universe.
        </div>
        <ul class="assess-list">
          ${functional.map(f => `
            <li class="assess-item">
              <span style="display: inline-block; padding: 0.2rem 0.55rem; background: rgba(74, 158, 255, 0.12); color: var(--blue); border-radius: 4px; font-size: 0.78rem; font-weight: 600; min-width: 80px; text-align: center;">ALIAS</span>
              <div>
                <div class="assess-text" style="font-weight: 600;">${escapeHtml(f.title || '')}</div>
                <div class="assess-evidence">${escapeHtml(f.rationale || '')}</div>
              </div>
            </li>
          `).join('')}
        </ul>
      </div>
    `;
  }

  // Adjacent crossover — different roles, but same person could shift
  if (adjacent.length) {
    const diffPill = (d) => {
      const colors = {
        easy: ['rgba(74, 222, 128, 0.12)', 'var(--good)'],
        moderate: ['rgba(255, 183, 77, 0.12)', 'var(--warn)'],
        hard: ['rgba(255, 107, 107, 0.12)', 'var(--danger)'],
      };
      const [bg, fg] = colors[(d || '').toLowerCase()] || ['rgba(139,155,179,0.12)', 'var(--text-dim)'];
      return `<span style="display: inline-block; padding: 0.2rem 0.55rem; background: ${bg}; color: ${fg}; border-radius: 4px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; margin-left: 0.4rem;">${escapeHtml(d || 'unknown')}</span>`;
    };
    body += `
      <div class="sub-section">
        <div class="sub-section-title">Adjacent talent you'd never search for</div>
        <div style="font-size: 0.83rem; color: var(--text-mute); margin-bottom: 0.6rem;">
          Different roles where the same person could make the jump.
          These are poaching candidates a junior sourcer wouldn't think to look at.
        </div>
        <ul class="assess-list">
          ${adjacent.map(a => `
            <li class="assess-item">
              <span style="display: inline-block; padding: 0.2rem 0.55rem; background: rgba(139, 92, 246, 0.12); color: #a78bfa; border-radius: 4px; font-size: 0.78rem; font-weight: 600; min-width: 80px; text-align: center;">CROSSOVER</span>
              <div>
                <div class="assess-text" style="font-weight: 600;">
                  ${escapeHtml(a.title || '')}
                  ${diffPill(a.transition_difficulty)}
                </div>
                <div class="assess-evidence">${escapeHtml(a.rationale || '')}</div>
              </div>
            </li>
          `).join('')}
        </ul>
      </div>
    `;
  }

  return `
    <section class="card">
      <div class="card-label">Title intelligence</div>
      <h2 class="card-title">Where the talent really hides</h2>
      <p style="color: var(--text-dim); margin-bottom: 1.25rem; font-size: 0.92rem;">
        The literal title misses 60% of qualified candidates. Here are the alternative
        titles a grandmaster sourcer would search across to expand the universe.
      </p>
      ${body}
    </section>
  `;
}

function renderBooleanCard(b) {
  const lr = [];

  for (const [key, val] of Object.entries(b)) {
    if (key === 'mentor_notes' || key === 'company_clusters') continue;
    if (typeof val !== 'string' || !val.trim()) continue;
    if (key.startsWith('lr_')) lr.push({ key, val });
    else xray.push({ key, val });

  if (!lr.length && !xray.length) return '';
  const renderGroup = (items) => items.map(({ key, val }) => `
    <div class="bool-string">
      <div class="bool-label">
        <span>${escapeHtml(key.replace(/_/g, ' '))}</span>
        <button class="bool-copy" data-copy="${escapeHtml(val)}">Copy</button>
      </div>
      <div class="bool-text">${escapeHtml(val)}</div>
    </div>
  `).join('');
  return `
    <section class="card">
      <div class="card-label">Sourcing Strings</div>
      <h2 class="card-title">Boolean queries</h2>
      ${lr.length ? `
        <div class="bool-section">
          <div class="bool-section-title">LinkedIn Recruiter (paid)</div>

      ` : ''}
      ${xray.length ? `

          <div class="bool-section-title">X-Ray Searches (free)</div>
          ${renderGroup(xray)}
        </div>
      ` : ''}
    </section>
  `;
}

  `;
}

function renderSequencedPlayCard(plays) {
  if (!plays || !Array.isArray(plays) || plays.length === 0) return '';

  const phaseColor = (n) => {
    // Warm -> cool progression: phase 1 is warmest (green), phase 5 is coolest (blue/purple)
    const colors = {
      1: ['rgba(74, 222, 128, 0.15)', 'var(--good)'],
      2: ['rgba(74, 158, 255, 0.15)', 'var(--blue)'],
      3: ['rgba(255, 183, 77, 0.15)', 'var(--warn)'],
      4: ['rgba(139, 92, 246, 0.15)', '#a78bfa'],
      5: ['rgba(148, 163, 184, 0.15)', '#94a3b8'],
    };
    return colors[n] || ['rgba(139,155,179,0.12)', 'var(--text-dim)'];
  };

  const phases = plays.map((p, i) => {
    const [bg, fg] = phaseColor(p.phase);
    const isLast = i === plays.length - 1;
    return `
      <div style="position: relative; padding-left: 3rem; padding-bottom: ${isLast ? '0' : '1.75rem'};">
        ${!isLast ? `<div style="position: absolute; left: 1.05rem; top: 2.6rem; bottom: 0; width: 2px; background: var(--border);"></div>` : ''}
        <div style="position: absolute; left: 0; top: 0.25rem; width: 2.2rem; height: 2.2rem; border-radius: 50%; background: ${bg}; color: ${fg}; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.95rem; border: 2px solid var(--border);">${p.phase || '•'}</div>
        <div style="margin-bottom: 0.5rem; display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem;">
          <div style="font-weight: 700; font-size: 1.02rem; color: var(--text);">${escapeHtml(p.name || `Phase ${p.phase}`)}</div>
          <span style="display: inline-block; padding: 0.18rem 0.5rem; background: var(--bg-elev); color: var(--text-mute); border-radius: 4px; font-size: 0.72rem; font-family: var(--font-mono); font-weight: 600;">${escapeHtml(p.days || '')}</span>
          ${p.expected_response_rate ? `<span style="display: inline-block; padding: 0.18rem 0.5rem; background: ${bg}; color: ${fg}; border-radius: 4px; font-size: 0.72rem; font-weight: 700;">${escapeHtml(p.expected_response_rate)} response</span>` : ''}
        </div>
        ${(p.channels || []).length ? `
          <div style="margin: 0.5rem 0 0.6rem 0; display: flex; flex-wrap: wrap; gap: 0.35rem;">
            ${(p.channels || []).map(c => `<span style="display: inline-block; padding: 0.22rem 0.55rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 4px; font-size: 0.78rem; color: var(--text-dim);">${escapeHtml(c)}</span>`).join('')}
          </div>
        ` : ''}
        ${p.message_style ? `
          <div style="margin-top: 0.55rem;">
            <div style="font-size: 0.72rem; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; font-weight: 700;">Voice & angle</div>
            <div style="color: var(--text-dim); font-size: 0.9rem; line-height: 1.55;">${escapeHtml(p.message_style)}</div>
          </div>
        ` : ''}
        ${p.first_move ? `
          <div style="margin-top: 0.7rem;">
            <div style="font-size: 0.72rem; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; font-weight: 700;">Day 1 of this phase</div>
            <div style="padding: 0.6rem 0.8rem; background: var(--bg-elev); border-left: 3px solid ${fg}; border-radius: 4px; color: var(--text); font-size: 0.9rem; line-height: 1.6;">${escapeHtml(p.first_move)}</div>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');

  return `
    <section class="card">
      <div class="card-label">Sequenced play</div>
      <h2 class="card-title">How a grandmaster runs this over 21 days</h2>
      <p style="color: var(--text-dim); margin-bottom: 1.5rem; font-size: 0.92rem;">
        Most searches fail because recruiters blast LinkedIn on day 1 and hope.
        A grandmaster sequences: warmest channels first, broader cold outreach
        mid-week, unconventional venues next, back-channels last. Each phase
        has different expected response rates and a different message voice.
      </p>
      ${phases}
    </section>
  `;
}

function wireEvalForm() {
  const btn = document.getElementById('evalSubmit');
  if (!btn) return;
  btn.addEventListener('click', async () => {
    const reqId = btn.dataset.reqId;
    const text = document.getElementById('evalText').value.trim();
    const status = document.getElementById('evalStatus');
    if (text.length < 50) {
      status.style.color = 'var(--danger)';
      status.textContent = 'Need at least 50 chars of profile text.';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Evaluating...';
    status.style.color = 'var(--text-dim)';
    status.textContent = 'AI is scoring the candidate. This takes 15-30 seconds.';
    try {
      const payload = {
        req_id: reqId,
        candidate_text: text,
        candidate_name: document.getElementById('evalName').value.trim() || null,
        candidate_email: document.getElementById('evalEmail').value.trim() || null,
        linkedin_url: document.getElementById('evalLinkedin').value.trim() || null,
        github_url: document.getElementById('evalGithub').value.trim() || null,
        current_title: document.getElementById('evalTitle').value.trim() || null,
        current_company: document.getElementById('evalCompany').value.trim() || null,
        source: document.getElementById('evalSource').value.trim() || null,
      };
      await api('/source/evaluate', { method: 'POST', body: JSON.stringify(payload) });
      status.style.color = 'var(--good)';
      status.textContent = '✓ Candidate evaluated. Refreshing list...';
      document.getElementById('evalText').value = '';
      ['evalName','evalEmail','evalLinkedin','evalGithub','evalTitle','evalCompany','evalSource'].forEach(id => document.getElementById(id).value = '');
      await loadSubmissions(reqId);
      setTimeout(() => { status.textContent = ''; }, 3000);
    } catch (e) {
      status.style.color = 'var(--danger)';
      status.textContent = e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Evaluate';
    }
  });
}

async function loadSubmissions(reqId) {
  const container = document.getElementById('submissionsList');
  if (!container) return;
  try {
    const data = await api(`/reqs/${encodeURIComponent(reqId)}/submissions`);
    if (!data.submissions || data.submissions.length === 0) {
      container.innerHTML = '<div style="color: var(--text-mute); font-size: 0.9rem; padding: 1rem 0;">No candidates evaluated yet. Use the form below to add one.</div>';
      return;
    }
    container.innerHTML = data.submissions.map(s => renderSubmissionRow(s)).join('');
    container.querySelectorAll('.sub-row').forEach(row => {
      row.addEventListener('click', () => row.classList.toggle('expanded'));
    });
  } catch (e) {
    container.innerHTML = `<div class="err-box">Could not load submissions: ${escapeHtml(e.message)}</div>`;
  }
}

function scoreClass(s) {
  if (s >= 80) return 'high';
  if (s >= 60) return 'mid';
  return 'low';
}

const STAGES = [
  {key: 'submitted',    label: 'Submitted'},
  {key: 'phone_screen', label: 'Phone'},
  {key: 'onsite',       label: 'Onsite'},
  {key: 'offer',        label: 'Offer'},
  {key: 'placed',       label: 'Placed',   cls: 'placed'},
  {key: 'rejected',     label: 'Rejected', cls: 'rejected'},
];

function renderStageBar(submissionId, currentStage) {
  const cur = currentStage || 'submitted';
  const buttons = STAGES.map(st => {
    const isActive = st.key === cur;
    const clsParts = ['stage-btn'];
    if (st.cls) clsParts.push(st.cls);
    if (isActive) clsParts.push('active');
    return `<button class="${clsParts.join(' ')}" data-stage="${st.key}" data-sub="${escapeHtml(submissionId)}" onclick="event.stopPropagation(); changeStage('${escapeHtml(submissionId)}', '${st.key}', this)">${escapeHtml(st.label)}</button>`;
  }).join('');
  return `
    <div class="stage-bar">
      <span class="stage-bar-label">Stage</span>
      ${buttons}
      <button class="sched-trigger" onclick="event.stopPropagation(); openScheduleModal('${escapeHtml(submissionId)}', this)" title="Schedule a screen for this candidate">+ Schedule screen</button>
      <div id="stage-feedback-${escapeHtml(submissionId)}" style="width: 100%; display: none;"></div>
    </div>
  `;
}

async function changeStage(submissionId, newStage, btnEl) {
  const bar = btnEl.parentElement;
  const feedbackEl = document.getElementById(`stage-feedback-${submissionId}`);
  // Disable all buttons while in flight
  bar.querySelectorAll('.stage-btn').forEach(b => b.disabled = true);
  feedbackEl.style.display = 'none';

  try {
    const result = await api(`/submissions/${encodeURIComponent(submissionId)}/stage`, {
      method: 'POST',
      body: JSON.stringify({stage: newStage}),
    });
    // Update button highlighting
    bar.querySelectorAll('.stage-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.stage === newStage);
    });
    // Show feedback
    const msg = [];
    msg.push(`Stage updated: ${result.from_stage} -> ${result.to_stage}`);
    if (result.calibration_signal !== 0) {
      const sign = result.calibration_signal > 0 ? '+' : '';
      msg.push(`Signal ${sign}${result.calibration_signal}`);
    }
    if (result.calibration_run) {
      msg.push(`${result.calibration_run.pairs_updated} adjacency pair(s) updated`);
    }
    feedbackEl.className = 'stage-feedback';
    feedbackEl.textContent = msg.join(' · ');
    feedbackEl.style.display = 'block';
  } catch (e) {
    feedbackEl.className = 'stage-feedback err';
    feedbackEl.textContent = `Could not update stage: ${e.message}`;
    feedbackEl.style.display = 'block';
  } finally {
    bar.querySelectorAll('.stage-btn').forEach(b => b.disabled = false);
  }
}

function renderEngineScorecard(s) {
  // Phase A finishing: render the 8-dimension deterministic engine output
  // alongside the AI's narrative evaluation. Falls back gracefully when
  // engine data isn't present (older submissions pre-2026-05-11).
  const eng = s.engine;
  if (!eng || eng.composite === null || eng.composite === undefined) {
    return '';
  }
  const dimColor = (val) => {
    if (val === null || val === undefined) return 'var(--text-mute)';
    if (val >= 4.0) return 'var(--good)';
    if (val >= 3.0) return 'var(--accent)';
    if (val >= 2.0) return 'var(--warn)';
    return 'var(--danger)';
  };
  const fmt = (v) => (v === null || v === undefined) ? '–' : Number(v).toFixed(2);
  const dims = [
    { key: 'technical_match', label: 'Technical Match', weight: 25, src: 'code' },
    { key: 'seniority_fit', label: 'Seniority Fit', weight: 15, src: 'code' },
    { key: 'location_alignment', label: 'Location', weight: 10, src: 'code' },
    { key: 'comp_alignment', label: 'Comp Alignment', weight: 15, src: 'code' },
    { key: 'culture_signals', label: 'Culture Signals', weight: 5, src: 'ai+code' },
    { key: 'gap_severity', label: 'Gap Severity', weight: 10, src: 'code' },
    { key: 'presentation_risk', label: 'Presentation Risk', weight: 10, src: 'ai+code' },
    { key: 'fill_probability', label: 'Fill Probability', weight: 10, src: 'code' },
  ];
  const breakdown = eng.breakdown || {};
  const breakdownDims = breakdown.dimensions || {};
  const compositeData = breakdown.composite || {};
  const recommendation = compositeData.recommendation || '–';
  const compositeNote = compositeData.note || '';
  const hasBlockers = eng.blocker_count && eng.blocker_count > 0;

  const dimRows = dims.map(d => {
    const val = eng[d.key];
    const note = (breakdownDims[d.key] && breakdownDims[d.key].note) || '';
    return `
      <div class="dim-row">
        <div class="dim-label">
          <div class="dim-name">${d.label}</div>
          <div class="dim-meta">${d.weight}% · ${d.src}</div>
        </div>
        <div class="dim-score" style="color: ${dimColor(val)};">${fmt(val)}<span class="dim-max">/5</span></div>
        <div class="dim-rationale">${escapeHtml(note)}</div>
      </div>
    `;
  }).join('');

  const blockersHtml = (breakdown.blockers || []).map(b => `
    <li style="padding: 0.3rem 0; color: var(--danger); font-size: 0.85rem;">
      ✕ <strong>${escapeHtml(b.requirement_text || '')}</strong>: ${escapeHtml(b.rationale || '')}
    </li>
  `).join('');

  return `
    <div class="sub-section engine-scorecard">
      <div class="engine-header">
        <div class="engine-title">
          <span class="engine-badge">Engine Scorecard</span>
          <span class="engine-sub">Deterministic 8-dimension match</span>
        </div>
        <div class="engine-composite">
          <div class="composite-score" style="color: ${dimColor(eng.composite)};">${fmt(eng.composite)}</div>
          <div class="composite-rec ${recommendation.replace(/\s+/g, '-')}">${escapeHtml(recommendation)}</div>
        </div>
      </div>
      ${hasBlockers ? `
        <div class="engine-blocker-banner">
          ⚠ ${eng.blocker_count} blocker${eng.blocker_count > 1 ? 's' : ''} present.
          Composite capped at 3.0 per matching engine spec.
        </div>
      ` : ''}
      <div class="dim-grid">${dimRows}</div>
      ${blockersHtml ? `
        <div class="engine-blockers">
          <div class="sub-section-title" style="margin-top: 0.5rem;">Detected blockers</div>
          <ul style="list-style: none; padding: 0; margin: 0.25rem 0 0;">${blockersHtml}</ul>
        </div>
      ` : ''}
      ${compositeNote ? `
        <div class="engine-composite-note" title="${escapeHtml(compositeNote)}">${escapeHtml(compositeNote)}</div>
      ` : ''}
    </div>
  `;
}

          <div class="sub-name">${escapeHtml(s.candidate_name || 'Unnamed')}</div>

        ${e.summary ? `<div class="sub-section"><div class="sub-section-title">Summary</div><div style="font-size: 0.9rem; color: var(--text-dim);">${escapeHtml(e.summary)}</div></div>` : ''}
        ${blockerList ? `<div class="sub-section"><div class="sub-section-title">Blocker assessment</div><ul class="assess-list">${blockerList}</ul></div>` : ''}
        ${preferredList ? `<div class="sub-section"><div class="sub-section-title">Preferred assessment</div><ul class="assess-list">${preferredList}</ul></div>` : ''}
        ${strengths ? `<div class="sub-section"><div class="sub-section-title">Strengths</div><ul style="list-style: none;">${strengths}</ul></div>` : ''}
        ${risks ? `<div class="sub-section"><div class="sub-section-title">Risks to probe</div><ul style="list-style: none;">${risks}</ul></div>` : ''}

        ${e.comp_check ? `<div class="sub-section"><div class="sub-section-title">Comp check</div><div style="font-size: 0.88rem;">${escapeHtml(e.comp_check)}</div></div>` : ''}

// ---------- Schedule modal (Phase E.3) ----------
let _schedTargetSubmissionId = null;

function openScheduleModal(submissionId, btnEl) {
  _schedTargetSubmissionId = submissionId;
  // Default to tomorrow at 10am local time
  const tomorrow = new Date(Date.now() + 24*60*60*1000);
  tomorrow.setHours(10, 0, 0, 0);
  // datetime-local input wants "YYYY-MM-DDTHH:MM" in local time
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('schedDate').value =
    `${tomorrow.getFullYear()}-${pad(tomorrow.getMonth()+1)}-${pad(tomorrow.getDate())}T${pad(tomorrow.getHours())}:${pad(tomorrow.getMinutes())}`;
  document.getElementById('schedDuration').value = '30';
  document.getElementById('schedType').value = 'phone_screen';
  document.getElementById('schedInterviewer').value = '';
  document.getElementById('schedNotes').value = '';
  document.getElementById('schedErr').classList.remove('show');
  document.getElementById('schedSubmit').disabled = false;
  document.getElementById('schedSubmit').textContent = 'Schedule';
  // Pull candidate name from the parent submission row for the modal subhead
  const row = btnEl.closest('.sub-row');
  const candidateName = row ? (row.querySelector('.sub-name')?.textContent || 'candidate') : 'candidate';
  document.getElementById('schedModalSub').textContent = `For ${candidateName}. Stage will move to phone_screen or onsite, calibration signal will fire, prep brief auto-generated.`;
  document.getElementById('schedModal').classList.add('open');
}

function closeScheduleModal() {
  document.getElementById('schedModal').classList.remove('open');
  _schedTargetSubmissionId = null;
}

async function submitSchedule() {
  if (!_schedTargetSubmissionId) return;
  const btn = document.getElementById('schedSubmit');
  const errEl = document.getElementById('schedErr');
  errEl.classList.remove('show');

  const dt = document.getElementById('schedDate').value;
  if (!dt) { errEl.textContent = 'Pick a date and time'; errEl.classList.add('show'); return; }
  // Convert local datetime-local to ISO with timezone
  const isoFor = new Date(dt).toISOString();

  const payload = {
    submission_id: _schedTargetSubmissionId,
    scheduled_for: isoFor,
    duration_minutes: parseInt(document.getElementById('schedDuration').value, 10),
    interview_type: document.getElementById('schedType').value,
    interviewer: document.getElementById('schedInterviewer').value.trim() || null,
    meeting_link: document.getElementById('schedMeetingLink').value.trim() || null,
    notes: document.getElementById('schedNotes').value.trim() || null,
  };

  btn.disabled = true;
  btn.textContent = 'Scheduling...';
  try {
    const result = await api('/schedule/create', {
      method: 'POST',
      body: JSON.stringify(payload),
    });
    // Success: close + refresh
    closeScheduleModal();
    // Reload submissions to reflect the new stage
    const container = document.querySelector('[data-req-id]');
    if (container) {
      const rid = container.getAttribute('data-req-id');
      if (rid) loadSubmissions(rid);
    }
    // Brief toast - quick alert is fine for now
    const sigText = result.calibration_signal ? ` (signal +${result.calibration_signal})` : '';
    alert(`Screen scheduled. Stage: ${result.from_stage} -> ${result.to_stage}${sigText}`);
  } catch (e) {
    errEl.textContent = 'Could not schedule: ' + (e.message || 'unknown error');
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Schedule';
  }
}

const params = new URLSearchParams(location.search);
const reqParam = params.get('req');
if (reqParam) {
  loadDetail(reqParam);
} else {
  loadList();
}
</script>

<!-- Schedule screen modal (Phase E.3) -->
<div id="schedModal" class="modal-backdrop" onclick="if(event.target===this) closeScheduleModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Schedule a screen</h3>
    <div class="modal-sub" id="schedModalSub">Loading...</div>

    <label>Date and time</label>
    <input id="schedDate" type="datetime-local" />

    <label>Duration (minutes)</label>
    <select id="schedDuration">
      <option value="15">15 min</option>
      <option value="30" selected>30 min</option>
      <option value="45">45 min</option>
      <option value="60">60 min</option>
    </select>

    <label>Interview type</label>
    <select id="schedType">
      <option value="phone_screen">Phone screen</option>
      <option value="technical">Technical screen</option>
      <option value="behavioral">Behavioral screen</option>
      <option value="onsite">Onsite</option>
    </select>

    <label>Interviewer (optional)</label>
    <input id="schedInterviewer" type="text" placeholder="Name or email" />

    <label>Meeting link (optional)</label>
    <input id="schedMeetingLink" type="text" placeholder="Zoom / Meet / Teams URL or dial-in" />

    <label>Notes (optional)</label>
    <textarea id="schedNotes" placeholder="Anything to remember about this screen"></textarea>

    <div id="schedErr" class="modal-err"></div>

    <div class="modal-actions">
      <button class="modal-btn" onclick="closeScheduleModal()">Cancel</button>
      <button class="modal-btn primary" id="schedSubmit" onclick="submitSchedule()">Schedule</button>
    </div>
  </div>
</div>

</body>
</html>
