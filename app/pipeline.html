<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline · SourcingNav Talent Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --bg-elev: #111827; --bg-card: #151d2e;
    --border: #1f2a3f; --border-strong: #2d3a54;
    --text: #e8ecf4; --text-dim: #8b9bb3; --text-mute: #5a6c85;
    --accent: #3dd9d6; --accent-deep: #2eb8b5; --blue: #4a9eff;
    --accent-glow: rgba(61, 217, 214, 0.15);
    --gradient: linear-gradient(135deg, #3dd9d6 0%, #4a9eff 100%);
    --danger: #ff6b6b; --warn: #ffb74d; --good: #4ade80;
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; background-image: radial-gradient(ellipse at top right, rgba(61,217,214,0.06) 0%, transparent 50%), radial-gradient(ellipse at bottom left, rgba(74,158,255,0.04) 0%, transparent 50%); background-attachment: fixed; }
</style>
<style>
  .nav { position: sticky; top: 0; z-index: 100; background: rgba(10, 14, 26, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
  .nav-inner { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  .brand { font-family: var(--font-mono); font-weight: 700; font-size: 1rem; letter-spacing: 0.08em; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
  .brand-sub { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-mute); margin-left: 0.75rem; padding-left: 0.75rem; border-left: 1px solid var(--border-strong); }
  .nav-right { display: flex; align-items: center; gap: 1.5rem; font-size: 0.85rem; }
  .nav-link { color: var(--text-dim); text-decoration: none; transition: color 0.15s; }
  .nav-link:hover { color: var(--accent); }
  .nav-link.active { color: var(--text); }
  .page { max-width: 1400px; margin: 0 auto; padding: 3rem 2rem 6rem; }
  .page-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end; gap: 2rem; flex-wrap: wrap; }
  .page-kicker { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .page-title { font-size: 2.25rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.05; }
  .page-title em { font-style: italic; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .page-desc { color: var(--text-dim); font-size: 1rem; max-width: 640px; margin-top: 0.5rem; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; }
  .card-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-mute); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.25rem; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-family: var(--font-body); font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; text-decoration: none; }
  .btn-primary { background: var(--gradient); color: #0a0e1a; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(61, 217, 214, 0.3); }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border-strong); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
</style>
<style>
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .filter-chip { padding: 0.5rem 1rem; background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 999px; color: var(--text-dim); font-size: 0.85rem; cursor: pointer; transition: all 0.15s; font-family: var(--font-body); }
  .filter-chip:hover { color: var(--text); border-color: var(--accent); }
  .filter-chip.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
  .req-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 1.5rem; padding: 1.25rem 1.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 0.75rem; cursor: pointer; transition: all 0.15s; align-items: center; text-decoration: none; color: inherit; }
  .req-row:hover { border-color: var(--accent); transform: translateX(2px); }
  .req-title { font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem; }
  .req-meta { color: var(--text-mute); font-size: 0.8rem; font-family: var(--font-mono); }
  .req-fee { font-family: var(--font-mono); color: var(--accent); font-weight: 600; font-size: 0.95rem; }
  .req-status { font-family: var(--font-mono); font-size: 0.7rem; padding: 0.3rem 0.7rem; border-radius: 999px; letter-spacing: 0.05em; text-transform: uppercase; }
  .req-status.open { background: rgba(74, 222, 128, 0.15); color: var(--good); }
  .req-status.placed { background: rgba(61, 217, 214, 0.15); color: var(--accent); }
  .req-status.closed { background: rgba(139, 155, 179, 0.15); color: var(--text-dim); }
  .req-arrow { color: var(--text-mute); font-size: 1.2rem; }
  .empty-state { padding: 4rem 2rem; text-align: center; background: var(--bg-card); border: 1px dashed var(--border-strong); border-radius: 12px; }
  .empty-state h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
  .empty-state p { color: var(--text-dim); margin-bottom: 1.5rem; }
  .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--text-dim); text-decoration: none; font-size: 0.85rem; margin-bottom: 1rem; transition: color 0.15s; font-family: var(--font-mono); }
  .back-link:hover { color: var(--accent); }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .kpi { padding: 1.25rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; }
  .kpi-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-mute); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .kpi-value { font-family: var(--font-mono); font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .kpi-value.text { font-size: 1rem; color: var(--text); }
</style>
<style>
  .skill-list { list-style: none; }
  .skill-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
  .skill-item:last-child { border-bottom: none; }
  .skill-name { font-weight: 500; }
  .skill-rationale { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.25rem; }
  .severity { font-family: var(--font-mono); font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px; letter-spacing: 0.05em; text-transform: uppercase; flex-shrink: 0; }
  .severity.blocker { background: rgba(255, 107, 107, 0.15); color: var(--danger); }
  .severity.preferred { background: rgba(255, 183, 77, 0.15); color: var(--warn); }
  .bool-section { margin-bottom: 2rem; }
  .bool-section-title { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .bool-string { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
  .bool-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-mute); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
  .bool-copy { background: transparent; border: 1px solid var(--border-strong); color: var(--text-dim); padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.7rem; cursor: pointer; font-family: var(--font-mono); }
  .bool-copy:hover { color: var(--accent); border-color: var(--accent); }
  .bool-copy.copied { color: var(--good); border-color: var(--good); }
  .bool-text { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text); word-break: break-all; line-height: 1.5; }
  .loading { padding: 4rem 2rem; text-align: center; color: var(--text-dim); font-family: var(--font-mono); }
  .err-box { background: rgba(255, 107, 107, 0.08); border: 1px solid var(--danger); border-radius: 8px; padding: 1rem; color: var(--danger); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 1.5rem; color: var(--text-dim); font-family: var(--font-mono); font-size: 0.85rem; margin-bottom: 1rem; }
  .note-block { padding: 1rem; background: var(--bg-elev); border-left: 3px solid var(--accent); border-radius: 4px; margin-bottom: 0.75rem; }
  .note-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.4rem; }
  .note-text { font-size: 0.9rem; color: var(--text); }
  /* Candidate evaluation */
  .eval-textarea { width: 100%; min-height: 200px; padding: 1rem; background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 8px; color: var(--text); font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.5; resize: vertical; }
  .eval-textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .eval-input-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; margin-top: 1rem; }
  .eval-input { padding: 0.7rem 0.9rem; background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: 0.88rem; }
  .eval-input:focus { outline: none; border-color: var(--accent); }
  .sub-row { padding: 1.25rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.75rem; cursor: pointer; transition: all 0.15s; }
  .sub-row:hover { border-color: var(--accent); }
  .sub-row.expanded { border-color: var(--accent); }
  .sub-header { display: grid; grid-template-columns: auto 1fr auto auto; gap: 1rem; align-items: center; }
  .sub-score { font-family: var(--font-mono); font-weight: 700; font-size: 1.5rem; min-width: 60px; }
  .sub-score.high { color: var(--good); }
  .sub-score.mid { color: var(--warn); }
  .sub-score.low { color: var(--danger); }
  .sub-name { font-weight: 600; }
  .sub-meta { color: var(--text-mute); font-size: 0.8rem; font-family: var(--font-mono); margin-top: 0.25rem; }
  .sub-rec { font-family: var(--font-mono); font-size: 0.7rem; padding: 0.3rem 0.7rem; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em; }
  .sub-rec.SUBMIT { background: rgba(74, 222, 128, 0.15); color: var(--good); }
  .sub-rec.INTERVIEW { background: rgba(255, 183, 77, 0.15); color: var(--warn); }
  .sub-rec.PASS { background: rgba(139, 155, 179, 0.15); color: var(--text-dim); }
  .sub-detail { display: none; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  .sub-row.expanded .sub-detail { display: block; }
  .sub-section { margin-bottom: 1.25rem; }
  .sub-section-title { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.6rem; }
  .assess-list { list-style: none; }
  .assess-item { display: flex; gap: 0.75rem; padding: 0.5rem 0; align-items: flex-start; }
  .assess-status { font-family: var(--font-mono); font-size: 0.65rem; padding: 0.15rem 0.45rem; border-radius: 4px; flex-shrink: 0; text-transform: uppercase; }
  .assess-status.met { background: rgba(74,222,128,0.15); color: var(--good); }
  .assess-status.partial { background: rgba(255,183,77,0.15); color: var(--warn); }
  .assess-status.missing, .assess-status.unclear { background: rgba(255,107,107,0.15); color: var(--danger); }
  .assess-text { font-size: 0.88rem; }
  .assess-evidence { color: var(--text-dim); font-size: 0.8rem; margin-top: 0.2rem; }

  /* Stage transition controls (Phase B1 calibration UI) */
  .stage-bar {
    display: flex; gap: 0.4rem; flex-wrap: wrap;
    padding: 0.75rem; background: rgba(61, 217, 214, 0.05);
    border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 1rem;
  }
  .stage-bar-label {
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-mute); font-weight: 600; align-self: center;
    margin-right: 0.4rem;
  }
  .stage-btn {
    padding: 0.35rem 0.7rem; font-size: 0.82rem; font-weight: 500;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); border-radius: 6px; cursor: pointer;
    transition: all 0.15s;
  }
  .stage-btn:hover:not(:disabled) {
    border-color: var(--accent); color: var(--text);
  }
  .stage-btn.active {
    background: var(--accent); color: #0b1220;
    border-color: var(--accent); font-weight: 600;
  }
  .stage-btn.placed { background: rgba(74,222,128,0.15); color: var(--good); border-color: var(--good); }
  .stage-btn.placed.active { background: var(--good); color: #0b1220; }
  .stage-btn.rejected { background: rgba(255,107,107,0.08); color: var(--danger); border-color: var(--danger); }
  .stage-btn.rejected.active { background: var(--danger); color: white; }
  .stage-btn:disabled { opacity: 0.5; cursor: wait; }
  .stage-feedback {
    padding: 0.6rem 0.75rem; margin-top: 0.5rem; border-radius: 6px;
    font-size: 0.85rem; background: rgba(61, 217, 214, 0.08);
    border: 1px solid var(--border);
  }
  .stage-feedback.err { background: rgba(255,107,107,0.08); color: var(--danger); }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <div>
      <a href="/" class="brand">SOURCINGNAV</a>
      <span class="brand-sub">TALENT ENGINE</span>
    </div>
    <div class="nav-right">
      <a href="/app/" class="nav-link">Intake</a>
      <a href="/app/pipeline.html" class="nav-link active">Pipeline</a>
      <a href="/app/taxonomy.html" class="nav-link">Taxonomy</a>
      <a href="/app/settings.html" class="nav-link">Settings</a>
    </div>
  </div>
</nav>
<main class="page">
  <div id="listView"></div>
  <div id="detailView" style="display: none;"></div>
</main>
<script>
// Global error handler — shows ANY uncaught error on screen instead of leaving
// a blank page. Catches both synchronous errors and unhandled promise rejections.
// Without this, a JS error during render can produce a page with no content
// and no feedback, making the user think the site is broken.
(function installGlobalErrorHandler() {
  function showError(msg, src) {
    const container = document.getElementById('detailView') || document.getElementById('listView') || document.body;
    if (!container) return;
    if (container.style) container.style.display = 'block';
    container.innerHTML = `
      <div style="max-width: 800px; margin: 2rem auto; padding: 1.5rem; background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.4); border-radius: 8px; color: #ffebee; font-family: system-ui, sans-serif;">
        <div style="font-weight: 700; font-size: 1rem; margin-bottom: 0.6rem; color: #ff6b6b;">Page error</div>
        <div style="font-size: 0.9rem; margin-bottom: 0.4rem;">${String(msg).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}</div>
        <div style="font-size: 0.8rem; opacity: 0.7;">Source: ${String(src || 'unknown').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}</div>
        <div style="margin-top: 0.8rem;"><a href="/app/pipeline.html" style="color: #3dd9d6;">Back to pipeline list</a></div>
      </div>
    `;
  }
  window.addEventListener('error', (e) => showError(e.message, e.filename + ':' + e.lineno));
  window.addEventListener('unhandledrejection', (e) => showError(e.reason?.message || e.reason || 'Promise rejected', 'async'));
})();

const API = '/api';
const token = localStorage.getItem('sn_token');
if (!token) {
  // Was: silent redirect that looked like a blank page when localStorage
  // was clear in a new tab. Now shows a visible message for 1 second,
  // then redirects. Never blank.
  document.addEventListener('DOMContentLoaded', () => {
    const c = document.getElementById('listView') || document.body;
    c.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-dim);">Signing you back in...</div>';
  });
  setTimeout(() => { location.href = '/app/'; }, 800);
}

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) };
  const res = await fetch(`${API}${path}`, { ...opts, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `Request failed (${res.status})`);
  }
  return res.json();
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function timeAgo(iso) {
  if (!iso) return 'unknown';
  const then = new Date(iso.includes('T') ? iso : iso.replace(' ', 'T') + 'Z');
  const diff = Math.floor((Date.now() - then.getTime()) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

function fmtFee(n) {
  if (n === null || n === undefined) return 'TBD';
  if (typeof n !== 'number') return escapeHtml(String(n));
  return '$' + Math.round(n).toLocaleString();
}

let allReqs = [];
let currentFilter = 'all';
async function loadList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('listView').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-kicker">Pipeline</div>
        <h1 class="page-title">Your <em>requisitions</em></h1>
        <p class="page-desc">Every JD you've intaked, ready to source against.</p>
      </div>
      <a href="/app/" class="btn btn-primary">+ New Intake</a>
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div id="reqsList" class="loading">Loading your pipeline...</div>
  `;
  try {
    const data = await api('/reqs');
    allReqs = data.reqs || [];
    renderFilters();
    renderList();
  } catch (e) {
    document.getElementById('reqsList').innerHTML = `<div class="err-box">Could not load pipeline: ${escapeHtml(e.message)}</div>`;
  }
}

function renderFilters() {
  const counts = { all: allReqs.length };
  for (const r of allReqs) counts[r.status] = (counts[r.status] || 0) + 1;
  const statuses = ['all', 'open', 'placed', 'closed'];
  document.getElementById('filterBar').innerHTML = statuses
    .filter(s => s === 'all' || counts[s])
    .map(s => `<button class="filter-chip ${s === currentFilter ? 'active' : ''}" data-filter="${s}">${s.charAt(0).toUpperCase() + s.slice(1)} (${counts[s] || 0})</button>`)
    .join('');
  document.querySelectorAll('.filter-chip').forEach(b => {
    b.addEventListener('click', () => {
      currentFilter = b.dataset.filter;
      renderFilters();
      renderList();
    });
  });
}
function renderList() {
  const list = document.getElementById('reqsList');
  list.classList.remove('loading');
  const filtered = currentFilter === 'all' ? allReqs : allReqs.filter(r => r.status === currentFilter);
  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <h3>${allReqs.length === 0 ? 'No requisitions yet' : `No ${currentFilter} requisitions`}</h3>
        <p>${allReqs.length === 0 ? 'Run your first JD intake to get started.' : 'Switch filters or run a new intake.'}</p>
        <a href="/app/" class="btn btn-primary">+ Run Intake</a>
      </div>
    `;
    return;
  }
  list.innerHTML = filtered.map(r => `
    <a class="req-row" href="/app/pipeline.html?req=${encodeURIComponent(r.id)}">
      <div>
        <div class="req-title">${escapeHtml(r.title)}</div>
        <div class="req-meta">${escapeHtml(r.org_name || 'Unknown org')} · Opened ${timeAgo(r.opened_at)}</div>
      </div>
      <div class="req-fee">${fmtFee(r.fee_estimate)}</div>
      <div class="req-status ${escapeHtml(r.status || 'open')}">${escapeHtml(r.status || 'open')}</div>
      <div class="req-arrow">→</div>
    </a>
  `).join('');
}

async function loadDetail(reqId) {
  document.getElementById('listView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  document.getElementById('detailView').innerHTML = `<div class="loading">Loading requisition...</div>`;
  try {
    const data = await api(`/reqs/${encodeURIComponent(reqId)}`);
    renderDetail(data);
  } catch (e) {
    document.getElementById('detailView').innerHTML = `
      <a href="/app/pipeline.html" class="back-link">← Back to pipeline</a>
      <div class="err-box">Could not load requisition: ${escapeHtml(e.message)}</div>
    `;
  }
}
function renderDetail(d) {
  const p = d.parsed || {};

  const mustHaves = (p.must_have_skills || []).slice().sort((a, b) => {

    return (order[a.severity] ?? 2) - (order[b.severity] ?? 2);

  const niceToHaves = p.nice_to_have_skills || [];
  document.getElementById('detailView').innerHTML = `

    ${renderWateringHolesCard(p.watering_holes)}

    ${renderEvaluateCard(d.id)}
    ${renderObjectionPlaybookCard(p.objection_playbook)}

    ${renderNotesCard(b.mentor_notes)}

  document.querySelectorAll('.bool-copy').forEach(btn => {

  wireEvalForm();
  loadSubmissions(d.id);
}
function renderCompCard(comp, p) {

}

function renderAltTitlesCard(alt) {
  // Backwards-compatible: old reqs may have flat ic_junior/ic_mid/etc structure;
  // new reqs have nested level_progression + functional_aliases + adjacent_crossover.
  if (!alt) return '';
  const levels = alt.level_progression || (alt.ic_junior !== undefined ? alt : null);
  const functional = alt.functional_aliases || [];
  const adjacent = alt.adjacent_crossover || [];

  // If literally nothing, render nothing
  const hasAnything = (levels && (
    (levels.ic_junior || []).length || (levels.ic_mid || []).length ||
    (levels.ic_senior || []).length || (levels.ic_staff_plus || []).length
  )) || functional.length || adjacent.length;
  if (!hasAnything) return '';

  const renderTitleChips = (arr) => (arr || []).map(t =>
    `<span style="display: inline-block; padding: 0.3rem 0.7rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; margin: 0.2rem;">${escapeHtml(t)}</span>`
  ).join('');

  let body = '';

  // Level progression — same role at different levels
  if (levels) {
    const rows = [
      ['Junior',     levels.ic_junior],
      ['Mid',        levels.ic_mid],
      ['Senior',     levels.ic_senior],
      ['Staff+',     levels.ic_staff_plus],
    ].filter(([_, arr]) => (arr || []).length);
    if (rows.length) {
      body += `
        <div class="sub-section">
          <div class="sub-section-title">Same role at different levels</div>
          <div style="font-size: 0.83rem; color: var(--text-mute); margin-bottom: 0.6rem;">
            What peer companies call this role at junior through staff+ levels.
            Useful when you're flexible on seniority.
          </div>
          <div style="display: grid; grid-template-columns: 80px 1fr; gap: 0.5rem 1rem; align-items: start;">
            ${rows.map(([label, arr]) => `
              <div style="font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-mute); padding-top: 0.5rem;">${label}</div>
              <div>${renderTitleChips(arr)}</div>
            `).join('')}
          </div>
        </div>
      `;
    }
  }

  // Functional aliases — same person, different naming convention
  if (functional.length) {
    body += `
      <div class="sub-section">
        <div class="sub-section-title">Same person, different name</div>
        <div style="font-size: 0.83rem; color: var(--text-mute); margin-bottom: 0.6rem;">
          What peer companies call the SAME person under different naming conventions.
          Add these to your search to broaden the candidate universe.
        </div>
        <ul class="assess-list">
          ${functional.map(f => `
            <li class="assess-item">
              <span style="display: inline-block; padding: 0.2rem 0.55rem; background: rgba(74, 158, 255, 0.12); color: var(--blue); border-radius: 4px; font-size: 0.78rem; font-weight: 600; min-width: 80px; text-align: center;">ALIAS</span>
              <div>
                <div class="assess-text" style="font-weight: 600;">${escapeHtml(f.title || '')}</div>
                <div class="assess-evidence">${escapeHtml(f.rationale || '')}</div>
              </div>
            </li>
          `).join('')}
        </ul>
      </div>
    `;
  }

  // Adjacent crossover — different roles, but same person could shift
  if (adjacent.length) {
    const diffPill = (d) => {
      const colors = {
        easy: ['rgba(74, 222, 128, 0.12)', 'var(--good)'],
        moderate: ['rgba(255, 183, 77, 0.12)', 'var(--warn)'],
        hard: ['rgba(255, 107, 107, 0.12)', 'var(--danger)'],
      };
      const [bg, fg] = colors[(d || '').toLowerCase()] || ['rgba(139,155,179,0.12)', 'var(--text-dim)'];
      return `<span style="display: inline-block; padding: 0.2rem 0.55rem; background: ${bg}; color: ${fg}; border-radius: 4px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; margin-left: 0.4rem;">${escapeHtml(d || 'unknown')}</span>`;
    };
    body += `
      <div class="sub-section">
        <div class="sub-section-title">Adjacent talent you'd never search for</div>
        <div style="font-size: 0.83rem; color: var(--text-mute); margin-bottom: 0.6rem;">
          Different roles where the same person could make the jump.
          These are poaching candidates a junior sourcer wouldn't think to look at.
        </div>
        <ul class="assess-list">
          ${adjacent.map(a => `
            <li class="assess-item">
              <span style="display: inline-block; padding: 0.2rem 0.55rem; background: rgba(139, 92, 246, 0.12); color: #a78bfa; border-radius: 4px; font-size: 0.78rem; font-weight: 600; min-width: 80px; text-align: center;">CROSSOVER</span>
              <div>
                <div class="assess-text" style="font-weight: 600;">
                  ${escapeHtml(a.title || '')}
                  ${diffPill(a.transition_difficulty)}

                <div class="assess-evidence">${escapeHtml(a.rationale || '')}</div>
              </div>
            </li>
          `).join('')}
        </ul>
      </div>
    `;
  }

  return `
    <section class="card">
      <div class="card-label">Title intelligence</div>
      <h2 class="card-title">Where the talent really hides</h2>
      <p style="color: var(--text-dim); margin-bottom: 1.25rem; font-size: 0.92rem;">
        The literal title misses 60% of qualified candidates. Here are the alternative
        titles a grandmaster sourcer would search across to expand the universe.
      </p>
      ${body}
    </section>
  `;
}

function renderBooleanCard(b) {
  const lr = [];

  for (const [key, val] of Object.entries(b)) {

    if (typeof val !== 'string' || !val.trim()) continue;
    if (key.startsWith('lr_')) lr.push({ key, val });
    else xray.push({ key, val });

  if (!lr.length && !xray.length) return '';
  const renderGroup = (items) => items.map(({ key, val }) => `
    <div class="bool-string">

        <span>${escapeHtml(key.replace(/_/g, ' '))}</span>

  return `
    <section class="card">

          <div class="bool-section-title">X-Ray Searches (free)</div>
          ${renderGroup(xray)}

      ` : ''}
    </section>
  `;
}

  return `

}

function renderSequencedPlayCard(plays) {
  if (!plays || !Array.isArray(plays) || plays.length === 0) return '';

  const phaseColor = (n) => {
    // Warm -> cool progression: phase 1 is warmest (green), phase 5 is coolest (blue/purple)
    const colors = {
      1: ['rgba(74, 222, 128, 0.15)', 'var(--good)'],
      2: ['rgba(74, 158, 255, 0.15)', 'var(--blue)'],
      3: ['rgba(255, 183, 77, 0.15)', 'var(--warn)'],
      4: ['rgba(139, 92, 246, 0.15)', '#a78bfa'],
      5: ['rgba(148, 163, 184, 0.15)', '#94a3b8'],
    };
    return colors[n] || ['rgba(139,155,179,0.12)', 'var(--text-dim)'];
  };

  const phases = plays.map((p, i) => {
    const [bg, fg] = phaseColor(p.phase);
    const isLast = i === plays.length - 1;
    return `
      <div style="position: relative; padding-left: 3rem; padding-bottom: ${isLast ? '0' : '1.75rem'};">
        ${!isLast ? `<div style="position: absolute; left: 1.05rem; top: 2.6rem; bottom: 0; width: 2px; background: var(--border);"></div>` : ''}
        <div style="position: absolute; left: 0; top: 0.25rem; width: 2.2rem; height: 2.2rem; border-radius: 50%; background: ${bg}; color: ${fg}; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.95rem; border: 2px solid var(--border);">${p.phase || '•'}</div>
        <div style="margin-bottom: 0.5rem; display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem;">
          <div style="font-weight: 700; font-size: 1.02rem; color: var(--text);">${escapeHtml(p.name || `Phase ${p.phase}`)}</div>
          <span style="display: inline-block; padding: 0.18rem 0.5rem; background: var(--bg-elev); color: var(--text-mute); border-radius: 4px; font-size: 0.72rem; font-family: var(--font-mono); font-weight: 600;">${escapeHtml(p.days || '')}</span>
          ${p.expected_response_rate ? `<span style="display: inline-block; padding: 0.18rem 0.5rem; background: ${bg}; color: ${fg}; border-radius: 4px; font-size: 0.72rem; font-weight: 700;">${escapeHtml(p.expected_response_rate)} response</span>` : ''}
        </div>
        ${(p.channels || []).length ? `
          <div style="margin: 0.5rem 0 0.6rem 0; display: flex; flex-wrap: wrap; gap: 0.35rem;">
            ${(p.channels || []).map(c => `<span style="display: inline-block; padding: 0.22rem 0.55rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 4px; font-size: 0.78rem; color: var(--text-dim);">${escapeHtml(c)}</span>`).join('')}
          </div>
        ` : ''}
        ${p.message_style ? `
          <div style="margin-top: 0.55rem;">
            <div style="font-size: 0.72rem; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; font-weight: 700;">Voice & angle</div>
            <div style="color: var(--text-dim); font-size: 0.9rem; line-height: 1.55;">${escapeHtml(p.message_style)}</div>
          </div>
        ` : ''}
        ${p.first_move ? `
          <div style="margin-top: 0.7rem;">
            <div style="font-size: 0.72rem; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; font-weight: 700;">Day 1 of this phase</div>
            <div style="padding: 0.6rem 0.8rem; background: var(--bg-elev); border-left: 3px solid ${fg}; border-radius: 4px; color: var(--text); font-size: 0.9rem; line-height: 1.6;">${escapeHtml(p.first_move)}</div>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');

  return `
    <section class="card">
      <div class="card-label">Sequenced play</div>
      <h2 class="card-title">How a grandmaster runs this over 21 days</h2>
      <p style="color: var(--text-dim); margin-bottom: 1.5rem; font-size: 0.92rem;">
        Most searches fail because recruiters blast LinkedIn on day 1 and hope.
        A grandmaster sequences: warmest channels first, broader cold outreach
        mid-week, unconventional venues next, back-channels last. Each phase
        has different expected response rates and a different message voice.
      </p>
      ${phases}
    </section>
  `;
}

function renderNotesCard(notes) {
  if (!notes || typeof notes !== 'object') return '';
  const entries = Object.entries(notes).filter(([k, v]) => v && typeof v === 'string');
  if (!entries.length) return '';
  return `
    <section class="card">
      <div class="card-label">Sourcer's Notes</div>
      <h2 class="card-title">Where to start</h2>
      ${entries.map(([k, v]) => `
        <div class="note-block">
          <div class="note-label">${escapeHtml(k.replace(/_/g, ' '))}</div>
          <div class="note-text">${escapeHtml(v)}</div>
        </div>
      `).join('')}
    </section>
  `;
}

function renderRawJDCard(jd) {
  if (!jd) return '';
  return `
    <section class="card">
      <div class="card-label">Original JD</div>
      <h2 class="card-title">Source text</h2>
      <details>
        <summary style="cursor: pointer; color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1rem;">Expand to view the original JD text</summary>
        <pre style="white-space: pre-wrap; word-break: break-word; font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-dim); background: var(--bg-elev); padding: 1.25rem; border-radius: 8px; margin-top: 0.5rem;">${escapeHtml(jd)}</pre>
      </details>
    </section>
  `;
}

function renderEvaluateCard(reqId) {
  return `
    <section class="card">
      <div class="card-label">Add Candidate</div>
      <h2 class="card-title">Evaluate a candidate against this role</h2>
      <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1rem;">Paste a LinkedIn profile, resume, or notes. Add optional details for cleaner records.</p>
      <textarea class="eval-textarea" id="evalText" placeholder="Paste candidate profile here (LinkedIn dump, resume, notes)..."></textarea>
      <div class="eval-input-row">
        <input class="eval-input" id="evalName" placeholder="Name (optional)">
        <input class="eval-input" id="evalEmail" placeholder="Email (optional, for dedup)">
        <input class="eval-input" id="evalLinkedin" placeholder="LinkedIn URL (optional)">
        <input class="eval-input" id="evalGithub" placeholder="GitHub URL (optional)">
      </div>
      <div class="eval-input-row">
        <input class="eval-input" id="evalTitle" placeholder="Current title (optional)">
        <input class="eval-input" id="evalCompany" placeholder="Current company (optional)">
        <input class="eval-input" id="evalSource" placeholder="Source: linkedin, github, referral...">
      </div>
      <div style="margin-top: 1.25rem; display: flex; gap: 0.75rem; align-items: center;">
        <button class="btn btn-primary" id="evalSubmit" data-req-id="${escapeHtml(reqId)}">Evaluate</button>
        <span id="evalStatus" style="font-size: 0.85rem; color: var(--text-dim);"></span>
      </div>
    </section>
  `;
}

function renderSubmissionsCard(reqId) {
  return `
    <section class="card">
      <div class="card-label">Submissions</div>
      <h2 class="card-title">Evaluated candidates</h2>
      <div id="submissionsList" data-req-id="${escapeHtml(reqId)}">Loading...</div>
    </section>
  `;
}

function wireEvalForm() {
  const btn = document.getElementById('evalSubmit');
  if (!btn) return;
  btn.addEventListener('click', async () => {
    const reqId = btn.dataset.reqId;
    const text = document.getElementById('evalText').value.trim();
    const status = document.getElementById('evalStatus');
    if (text.length < 50) {
      status.style.color = 'var(--danger)';
      status.textContent = 'Need at least 50 chars of profile text.';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Evaluating...';
    status.style.color = 'var(--text-dim)';
    status.textContent = 'AI is scoring the candidate. This takes 15-30 seconds.';
    try {
      const payload = {
        req_id: reqId,
        candidate_text: text,
        candidate_name: document.getElementById('evalName').value.trim() || null,
        candidate_email: document.getElementById('evalEmail').value.trim() || null,
        linkedin_url: document.getElementById('evalLinkedin').value.trim() || null,
        github_url: document.getElementById('evalGithub').value.trim() || null,
        current_title: document.getElementById('evalTitle').value.trim() || null,
        current_company: document.getElementById('evalCompany').value.trim() || null,
        source: document.getElementById('evalSource').value.trim() || null,
      };
      await api('/source/evaluate', { method: 'POST', body: JSON.stringify(payload) });
      status.style.color = 'var(--good)';
      status.textContent = '✓ Candidate evaluated. Refreshing list...';
      document.getElementById('evalText').value = '';
      ['evalName','evalEmail','evalLinkedin','evalGithub','evalTitle','evalCompany','evalSource'].forEach(id => document.getElementById(id).value = '');
      await loadSubmissions(reqId);
      setTimeout(() => { status.textContent = ''; }, 3000);
    } catch (e) {
      status.style.color = 'var(--danger)';
      status.textContent = e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Evaluate';
    }
  });
}

async function loadSubmissions(reqId) {
  const container = document.getElementById('submissionsList');
  if (!container) return;
  try {
    const data = await api(`/reqs/${encodeURIComponent(reqId)}/submissions`);
    if (!data.submissions || data.submissions.length === 0) {
      container.innerHTML = '<div style="color: var(--text-mute); font-size: 0.9rem; padding: 1rem 0;">No candidates evaluated yet. Use the form below to add one.</div>';
      return;
    }
    container.innerHTML = data.submissions.map(s => renderSubmissionRow(s)).join('');
    container.querySelectorAll('.sub-row').forEach(row => {
      row.addEventListener('click', () => row.classList.toggle('expanded'));
    });
  } catch (e) {
    container.innerHTML = `<div class="err-box">Could not load submissions: ${escapeHtml(e.message)}</div>`;
  }
}

function scoreClass(s) {
  if (s >= 80) return 'high';
  if (s >= 60) return 'mid';
  return 'low';
}

const STAGES = [
  {key: 'submitted',    label: 'Submitted'},
  {key: 'phone_screen', label: 'Phone'},
  {key: 'onsite',       label: 'Onsite'},
  {key: 'offer',        label: 'Offer'},
  {key: 'placed',       label: 'Placed',   cls: 'placed'},
  {key: 'rejected',     label: 'Rejected', cls: 'rejected'},
];

function renderStageBar(submissionId, currentStage) {
  const cur = currentStage || 'submitted';
  const buttons = STAGES.map(st => {
    const isActive = st.key === cur;
    const clsParts = ['stage-btn'];
    if (st.cls) clsParts.push(st.cls);
    if (isActive) clsParts.push('active');
    return `<button class="${clsParts.join(' ')}" data-stage="${st.key}" data-sub="${escapeHtml(submissionId)}" onclick="event.stopPropagation(); changeStage('${escapeHtml(submissionId)}', '${st.key}', this)">${escapeHtml(st.label)}</button>`;
  }).join('');
  return `
    <div class="stage-bar">
      <span class="stage-bar-label">Stage</span>
      ${buttons}
      <div id="stage-feedback-${escapeHtml(submissionId)}" style="width: 100%; display: none;"></div>
    </div>
  `;
}

async function changeStage(submissionId, newStage, btnEl) {
  const bar = btnEl.parentElement;
  const feedbackEl = document.getElementById(`stage-feedback-${submissionId}`);
  // Disable all buttons while in flight
  bar.querySelectorAll('.stage-btn').forEach(b => b.disabled = true);
  feedbackEl.style.display = 'none';

  try {
    const result = await api(`/submissions/${encodeURIComponent(submissionId)}/stage`, {
      method: 'POST',
      body: JSON.stringify({stage: newStage}),
    });
    // Update button highlighting
    bar.querySelectorAll('.stage-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.stage === newStage);
    });
    // Show feedback
    const msg = [];
    msg.push(`Stage updated: ${result.from_stage} -> ${result.to_stage}`);
    if (result.calibration_signal !== 0) {
      const sign = result.calibration_signal > 0 ? '+' : '';
      msg.push(`Signal ${sign}${result.calibration_signal}`);
    }
    if (result.calibration_run) {
      msg.push(`${result.calibration_run.pairs_updated} adjacency pair(s) updated`);
    }
    feedbackEl.className = 'stage-feedback';
    feedbackEl.textContent = msg.join(' · ');
    feedbackEl.style.display = 'block';
  } catch (e) {
    feedbackEl.className = 'stage-feedback err';
    feedbackEl.textContent = `Could not update stage: ${e.message}`;
    feedbackEl.style.display = 'block';
  } finally {
    bar.querySelectorAll('.stage-btn').forEach(b => b.disabled = false);
  }
}

function renderSubmissionRow(s) {
  const e = s.evaluation || {};
  const renderAssess = (list) => (list || []).map(b => `
    <li class="assess-item">
      <span class="assess-status ${escapeHtml(b.status || 'unclear')}">${escapeHtml(b.status || 'unclear')}</span>
      <div>
        <div class="assess-text">${escapeHtml(b.skill || '')}</div>
        <div class="assess-evidence">${escapeHtml(b.evidence || '')}</div>
      </div>
    </li>
  `).join('');
  const blockerList = renderAssess(e.blocker_assessment);
  const preferredList = renderAssess(e.preferred_assessment);
  const strengths = (e.strengths || []).map(x => `<li style="padding: 0.3rem 0; font-size: 0.88rem;">✓ ${escapeHtml(x)}</li>`).join('');
  const risks = (e.risks_to_probe || []).map(x => `<li style="padding: 0.3rem 0; font-size: 0.88rem;">⚠ ${escapeHtml(x)}</li>`).join('');
  const questions = (e.interview_questions || []).map(q => `
    <div style="padding: 0.6rem 0; border-bottom: 1px solid var(--border);">
      <div style="font-weight: 500; margin-bottom: 0.25rem;">${escapeHtml(q.question || '')}</div>
      <div style="color: var(--text-dim); font-size: 0.82rem;">Listen for: ${escapeHtml(q.what_to_listen_for || '')}</div>
    </div>
  `).join('');
  return `
    <div class="sub-row">
      <div class="sub-header">
        <div class="sub-score ${scoreClass(s.fit_score)}">${s.fit_score}</div>
        <div>
          <div class="sub-name">${escapeHtml(s.candidate_name || 'Unnamed')}</div>
          <div class="sub-meta">${escapeHtml(s.current_title || '')} ${s.current_company ? '· ' + escapeHtml(s.current_company) : ''} · ${timeAgo(s.created_at)}</div>
        </div>
        <div class="sub-rec ${escapeHtml(s.recommendation || 'PASS')}">${escapeHtml(s.recommendation || 'PASS')}</div>
        <div style="color: var(--text-mute);">▾</div>
      </div>
      <div class="sub-detail">
        ${renderStageBar(s.id, s.stage)}
        ${e.headline ? `<div class="sub-section"><div class="sub-section-title">Headline</div><div style="font-size: 0.95rem;">${escapeHtml(e.headline)}</div></div>` : ''}
        ${e.summary ? `<div class="sub-section"><div class="sub-section-title">Summary</div><div style="font-size: 0.9rem; color: var(--text-dim);">${escapeHtml(e.summary)}</div></div>` : ''}
        ${blockerList ? `<div class="sub-section"><div class="sub-section-title">Blocker assessment</div><ul class="assess-list">${blockerList}</ul></div>` : ''}
        ${preferredList ? `<div class="sub-section"><div class="sub-section-title">Preferred assessment</div><ul class="assess-list">${preferredList}</ul></div>` : ''}
        ${strengths ? `<div class="sub-section"><div class="sub-section-title">Strengths</div><ul style="list-style: none;">${strengths}</ul></div>` : ''}
        ${risks ? `<div class="sub-section"><div class="sub-section-title">Risks to probe</div><ul style="list-style: none;">${risks}</ul></div>` : ''}
        ${questions ? `<div class="sub-section"><div class="sub-section-title">Suggested interview questions</div>${questions}</div>` : ''}
        ${e.comp_check ? `<div class="sub-section"><div class="sub-section-title">Comp check</div><div style="font-size: 0.88rem;">${escapeHtml(e.comp_check)}</div></div>` : ''}
      </div>
    </div>
  `;
}
const params = new URLSearchParams(location.search);
const reqParam = params.get('req');
if (reqParam) {
  loadDetail(reqParam);
} else {
  loadList();
}
</script>
