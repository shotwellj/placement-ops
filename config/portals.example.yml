# ============================================================
# Placement-Ops — Target Company Portals
# ============================================================
# These are companies you want to monitor for new openings.
# The scanner crawls these career pages and flags roles
# that match your niche keywords.
#
# Copy this file:
#   cp config/portals.example.yml config/portals.yml
#
# Then add/remove companies for your market.
#
# Fields:
#   name          — Company name
#   careers_url   — Direct URL to their careers/jobs page
#   api           — (optional) Greenhouse API endpoint
#   scan_method   — playwright | greenhouse_api | websearch
#   notes         — Location, what they do, context for you
#   enabled       — true/false toggle
#   priority      — high | medium | low (how badly you want their business)
# ============================================================

# -----------------------------------------------
# AI LABS & LLM PROVIDERS
# -----------------------------------------------

- name: Anthropic
  careers_url: https://job-boards.greenhouse.io/anthropic
  api: https://boards-api.greenhouse.io/v1/boards/anthropic/jobs
  scan_method: greenhouse_api
  notes: "SF. Frontier AI lab. Always hiring ML researchers + engineers. Hard to place but huge fees."
  enabled: true
  priority: high

- name: OpenAI
  careers_url: https://openai.com/careers
  scan_method: websearch
  notes: "SF. The big one. Extremely competitive. Look for applied/platform roles, not research."
  enabled: true
  priority: high

- name: Google DeepMind
