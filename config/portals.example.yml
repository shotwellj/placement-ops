# ============================================================
# Placement-Ops — Target Company Portals (200+ Companies)
# ============================================================
# Companies organized by category with career page URLs,
# ATS types, and scan methods. Pre-loaded for Data/ML/AI
# recruiting. Fork and customize for your niche.
#
# Copy this file:
#   cp config/portals.example.yml config/portals.yml
#
# Stats: 200+ companies across 15 categories
# Last updated: 2026-04-08
#
# Fields:
#   name          — Company name
#   careers_url   — Direct URL to their careers/jobs page
#   api           — (optional) Greenhouse API endpoint
#   scan_method   — playwright | greenhouse_api | websearch
#   notes         — Location, what they do, context
#   enabled       — true/false toggle
#   priority      — high | medium | low
#   headcount     — approx employee count (helps gauge hiring volume)
# ============================================================


