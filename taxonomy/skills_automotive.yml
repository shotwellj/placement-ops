# ============================================================
# SourcingNav — Automotive & Mobility Software
# ============================================================
# Covers functional safety, automotive software architecture,
# vehicle networking, and ADAS/autonomous driving stacks.
# Applies to Tier 1 suppliers (Bosch, Continental, ZF),
# OEMs (Ford, GM, Toyota, Volkswagen, Stellantis, Rivian,
# Lucid, Tesla), and autonomous driving companies (Waymo,
# Cruise, Aurora, Motional, Zoox, Mobileye).
# ============================================================

# -----------------------------------------------
# FUNCTIONAL SAFETY & AUTOMOTIVE STANDARDS
# -----------------------------------------------
functional_safety:
  - name: ISO 26262
    aliases: [iso26262, automotive functional safety, road vehicle functional safety]
    adjacent: [ASIL, ASPICE, MISRA C]
    weight: high

  - name: ASIL
    aliases: [asil a, asil b, asil c, asil d, automotive safety integrity level]
    adjacent: [ISO 26262, ASPICE]
    weight: medium

  - name: ASPICE
    aliases: [automotive spice, automotive software process improvement]
    adjacent: [ISO 26262, AUTOSAR]
    weight: medium

  - name: MISRA C
    aliases: [misra c++, misra, misra-c]
    adjacent: [ISO 26262, Embedded C]
    weight: medium

  - name: ISO 21434
    aliases: [iso21434, automotive cybersecurity, road vehicle cybersecurity]
    adjacent: [ISO 26262, Automotive Cybersecurity]
    weight: medium

# -----------------------------------------------
# AUTOMOTIVE SOFTWARE ARCHITECTURE
# -----------------------------------------------
autosar:
  - name: AUTOSAR
    aliases: [autosar classic, autosar adaptive, autosar architecture]
    adjacent: [ISO 26262, Vehicle OS, Embedded Firmware]
    weight: high

  - name: AUTOSAR Classic
    aliases: [autosar classic platform, classic autosar]
    adjacent: [AUTOSAR, CAN bus, ISO 26262]
    weight: medium

  - name: AUTOSAR Adaptive
    aliases: [autosar adaptive platform, adaptive autosar]
    adjacent: [AUTOSAR, Vehicle OS, C++]
    weight: medium

  - name: Vehicle OS
    aliases: [vehicle operating system, software-defined vehicle, sdv, automotive os]
    adjacent: [AUTOSAR Adaptive, OTA Updates]
    weight: medium

  - name: OTA Updates
    aliases: [over-the-air updates, firmware ota, vehicle software updates]
    adjacent: [Vehicle OS, Embedded Firmware]
    weight: medium

