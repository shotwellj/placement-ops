    weight: high

  - name: LIN bus
    aliases: [lin, local interconnect network]
    adjacent: [CAN bus, FlexRay]
    weight: low

  - name: FlexRay
    aliases: [flex ray, flexray protocol]
    adjacent: [CAN bus, AUTOSAR]
    weight: low

  - name: Automotive Ethernet
