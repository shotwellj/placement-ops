# ============================================================
# SourcingNav — Medical Device & Regulated Healthcare Software
# ============================================================
# Covers FDA-regulated software development, quality management,
# validation/verification, healthcare data standards, and clinical
# systems. Applies to medical device software (SaMD), connected
# medical devices, EMR/EHR software, medical imaging, and any
# healthcare tech that touches patient data or clinical decisions.
#
# Regulatory knowledge is modeled as "skills" here because JDs
# conflate technical skills and regulatory knowledge. If we later
# split these out, these entries map cleanly to a compliance
# knowledge taxonomy.
# ============================================================

# -----------------------------------------------
# FDA REGULATORY
# -----------------------------------------------
fda_regulatory:
  - name: FDA 510(k)
    aliases: [fda 510k, 510(k) submission, premarket notification]
    adjacent: [FDA PMA, ISO 13485, Medical Device Software]
    weight: high

  - name: FDA PMA
    aliases: [premarket approval, fda premarket approval]
    adjacent: [FDA 510(k), ISO 13485, Clinical Trials Software]
    weight: medium

  - name: Design Controls
    aliases: [21 cfr 820.30, fda design controls, design history file, dhf]
    adjacent: [V&V, Risk Management, FDA 510(k)]
    weight: high

  - name: Medical Device Software
    aliases: [samd, software as a medical device, saimd, regulated medical software]
    adjacent: [FDA 510(k), IEC 62304, ISO 13485]
    weight: high

# -----------------------------------------------
# QUALITY MANAGEMENT & STANDARDS
# -----------------------------------------------
quality_standards:
  - name: ISO 13485
    aliases: [iso13485, qms, quality management system medical]
    adjacent: [FDA 510(k), Design Controls, IEC 62304]
    weight: high

  - name: IEC 62304
    aliases: [iec62304, medical device software lifecycle, medical software safety classification]
    adjacent: [ISO 13485, Medical Device Software, V&V]
    weight: high

  - name: ISO 14971
    aliases: [iso14971, medical device risk management, risk management medical]
    adjacent: [Risk Management, ISO 13485, Design Controls]
    weight: medium

  - name: IEC 60601
    aliases: [iec60601, medical electrical equipment, medical electrical safety]
    adjacent: [Medical Device Software, ISO 13485]
    weight: low

# -----------------------------------------------
# VALIDATION & VERIFICATION
# -----------------------------------------------
validation:
