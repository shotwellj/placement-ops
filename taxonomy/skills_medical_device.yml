    weight: high

  - name: IQ/OQ/PQ
    aliases: [iq oq pq, installation qualification, operational qualification, performance qualification]
    adjacent: [V&V, GxP]
    weight: medium

  - name: GxP
    aliases: [glp, gcp, gmp, good practice, gxp compliance]
    adjacent: [HIPAA, 21 CFR Part 11]
    weight: medium

  - name: 21 CFR Part 11
    aliases: [part 11, cfr part 11, electronic records electronic signatures]
