# -----------------------------------------------
# HOW TO EXTEND THIS FILE
# -----------------------------------------------
# 1. Add a new category section (e.g., "security:", "devops:")
# 2. Each skill needs: name, aliases, adjacent skills, weight
# 3. "adjacent" = skills that transfer. If a candidate knows one,
#    they get partial credit for the other.
# 4. "weight" = how important this skill is for your niche.
#    high = core to most roles you fill
#    medium = frequently seen but not always required
#    low = nice-to-have, appears occasionally
# 5. Run `/placement-ops calibrate` after changes to re-score
