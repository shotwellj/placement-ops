# ============================================================
# Placement-Ops — Skill Taxonomy
# ============================================================
# This is the brain of the matching engine. It maps every
# technology, tool, and concept into a structured hierarchy
# with adjacency relationships.
#
# When the matching engine sees "PyTorch" on a resume and
# "TensorFlow" in a JD, it knows they're adjacent ML frameworks
# and gives partial credit instead of marking it as a gap.
#
# HOW SCORING WORKS:
#   exact match    = 1.0 (candidate has exactly what the JD asks for)
#   adjacent match = 0.6 (candidate has a closely related skill)
#   parent match   = 0.3 (candidate has the broader category)
#   no match       = 0.0
#
# CUSTOMIZE: Add skills relevant to YOUR niche. The defaults
# cover Data/ML/AI. Fork and expand for other domains.
# ============================================================

# -----------------------------------------------
# PROGRAMMING LANGUAGES
# -----------------------------------------------
programming_languages:
  - name: Python
    aliases: [python3, py]
    adjacent: [R, Julia]
    weight: high              # how important in Data/ML roles

  - name: R
    aliases: [r-lang, rlang]
    adjacent: [Python, Julia]
    weight: medium

  - name: SQL
