# ============================================================
# SourcingNav — Aerospace & Defense Software
# ============================================================
# Covers flight-certified software, avionics, defense systems,
# space systems, and safety-critical aerospace development.
# Applies to primes (Lockheed, Boeing, Raytheon, Northrop,
# L3Harris, BAE), commercial space (SpaceX, Blue Origin,
# Relativity, Anduril for defense-tech), and Tier 1 suppliers
# (Honeywell, Collins, GE Aerospace, Rolls-Royce).
#
# Many of these roles require US citizenship and/or active
# security clearance. That's not a "skill" — it's an
# eligibility filter captured elsewhere on the req.
# ============================================================

# -----------------------------------------------
# AEROSPACE SAFETY STANDARDS
# -----------------------------------------------
aerospace_standards:
  - name: DO-178C
    aliases: [do178c, do 178c, software considerations in airborne systems, rtca do-178c]
    adjacent: [DAL, DO-254, ARP4754A]
    weight: high

  - name: DO-254
    aliases: [do254, do 254, airborne electronic hardware, rtca do-254]
    adjacent: [DO-178C, DAL, FPGA Development]
    weight: medium

  - name: ARP4754A
    aliases: [arp 4754a, arp4754, aircraft systems development]
    adjacent: [DO-178C, DO-254, Systems Engineering]
    weight: medium

  - name: DAL
    aliases: [design assurance level, dal a, dal b, dal c, dal d, level a software]
    adjacent: [DO-178C, DO-254]
    weight: medium

  - name: AS9100
    aliases: [as 9100, aerospace quality management, as9100 certification]
    adjacent: [DO-178C, ISO 9001]
    weight: low

  - name: ITAR
    aliases: [itar compliance, international traffic in arms regulations, export control]
    adjacent: [EAR, Security Clearance]
    weight: medium

  - name: EAR
    aliases: [export administration regulations, ear compliance]
    adjacent: [ITAR]
    weight: low

