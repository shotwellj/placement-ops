# ============================================================
# SourcingNav — Hardware & Semiconductor Skill Taxonomy
# ============================================================
# Covers RTL/verification, FPGA, ASIC, embedded firmware, SoC,
# EDA tools, chip bring-up, and hardware-software co-design.
#
# Adjacencies are symmetric: if A lists B, the seed script
# automatically inserts B→A too (Option 1, see ROADMAP).
#
# Unresolved skills from JDs and resumes accumulate as
# raw_skill_text on req_skills/candidate_skills and become
# candidates to add here.
# ============================================================

# -----------------------------------------------
# HARDWARE DESCRIPTION LANGUAGES (HDL)
# -----------------------------------------------
hdl:
  - name: Verilog
    aliases: [verilog HDL]
    adjacent: [SystemVerilog, VHDL, RTL Design]
    weight: high

  - name: SystemVerilog
    aliases: [sv, systemverilog hdl]
    adjacent: [Verilog, UVM, VHDL]
    weight: high

  - name: VHDL
    aliases: []
    adjacent: [Verilog, SystemVerilog]
    weight: medium

  - name: Chisel
    aliases: [chisel3]
    adjacent: [Verilog, SystemVerilog, RISC-V]
    weight: low

