  - name: ASIC Design
    aliases: [asic, application-specific integrated circuit]
    adjacent: [RTL Design, Physical Design, DFT, Timing Closure]
    weight: high

  - name: FPGA Development
    aliases: [fpga, field-programmable gate array]
    adjacent: [Verilog, SystemVerilog, Xilinx, Intel FPGA, Synthesis]
    weight: high

  - name: Physical Design
    aliases: [pd, place and route, backend design]
    adjacent: [ASIC Design, Timing Closure, Synthesis, Floorplanning]
    weight: medium

  - name: Timing Closure
    aliases: [static timing analysis, sta]
    adjacent: [Physical Design, Synthesis, ASIC Design]
    weight: medium

  - name: Synthesis
    aliases: [logic synthesis, rtl synthesis]
