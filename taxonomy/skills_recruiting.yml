# ============================================================
# Placement-Ops - Recruiting Skill Taxonomy
# ============================================================
# Skills that recruiters, sourcers, talent acquisition pros,
# and people-ops folks actually use. Until this file existed,
# the matching engine evaluated recruiter candidates against
# engineering taxonomies and scored everyone at zero.
#
# Key adjacency principle: Recruiting and Sourcing overlap
# heavily. A senior recruiter at a tier-1 tech company has
# sourcing as a sub-skill, full stop. The taxonomy reflects
# that with high adjacency scores between the two functions.
# ============================================================

# -----------------------------------------------
# CORE RECRUITING FUNCTIONS
# -----------------------------------------------
core_recruiting_functions:
  - name: Technical Sourcing
    aliases: [technical sourcer, sourcing, candidate sourcing, talent sourcing, passive candidate sourcing]
    adjacent: [Technical Recruiting, Talent Acquisition, Boolean Search, LinkedIn Recruiter, Engineering Recruiting]
    weight: high

  - name: Technical Recruiting
    aliases: [technical recruiter, full-cycle technical recruiting, engineering recruiter, software recruiter]
    adjacent: [Technical Sourcing, Talent Acquisition, Engineering Recruiting, Executive Search, Full-Cycle Recruiting]
    weight: high

  - name: Talent Acquisition
    aliases: [TA, talent acquisition specialist, recruiting, in-house recruiting]
    adjacent: [Technical Recruiting, Technical Sourcing, Talent Operations, Executive Search]
    weight: high

  - name: Full-Cycle Recruiting
    aliases: [full cycle recruiting, end-to-end recruiting, 360 recruiting]
    adjacent: [Technical Recruiting, Talent Acquisition, Candidate Closing, Technical Sourcing]
    weight: high

  - name: Engineering Recruiting
    aliases: [engineering recruiter, software engineering recruiting, eng recruiting]
    adjacent: [Technical Recruiting, Technical Sourcing, Hardware Recruiting]
    weight: high

  - name: Executive Search
    aliases: [exec search, retained search, leadership recruiting, executive recruiting]
    adjacent: [Technical Recruiting, Talent Acquisition]
    weight: medium

  - name: Agency Recruiting
    aliases: [contingency recruiting, third-party recruiting, recruiting agency, staffing]
    adjacent: [Technical Recruiting, Technical Sourcing, Full-Cycle Recruiting]
    weight: medium

  - name: Hardware Recruiting
    aliases: [hardware recruiter, embedded recruiting, electrical engineering recruiting]
    adjacent: [Engineering Recruiting, Technical Recruiting, Defense Recruiting]
    weight: medium

  - name: Defense Recruiting
    aliases: [cleared recruiting, government contract recruiting, defense talent acquisition, aerospace recruiting]
    adjacent: [Hardware Recruiting, Engineering Recruiting, Cleared Talent Network]
    weight: medium

